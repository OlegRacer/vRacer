<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer BLE Dash</title>
<style>
  :root{
    --bg:#0a0a0c; --panel:#111114; --line:rgba(255,255,255,0.08);
    --text:#f2f2f0; --muted:#8a8a92;
    --cyan:#37e0e6; --amber:#ffb74d; --red:#ff4d4d;
    --green:#4ade80; --blue:#3b82f6; --yellow:#ffd23f;
    --topbar-h:48px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  html,body{ margin:0;padding:0;height:100%;width:100%;background:var(--bg);
    color:var(--text);font-family:'Rajdhani','Segoe UI',sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased; }
  body{ background-image:
    repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 6px),
    repeating-linear-gradient(45deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 6px); }

  /* TOPBAR */
  .topbar{ position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;gap:6px;
    padding:max(6px,env(safe-area-inset-top)) 8px 6px;
    background:rgba(10,10,12,0.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); }
  .pill{ border:1px solid var(--line);border-radius:6px;padding:5px 10px;
    font-size:12px;letter-spacing:0.5px;color:var(--muted);
    background:rgba(255,255,255,0.02);white-space:nowrap;cursor:pointer; }
  .pill.on{ color:#9be8ff;border-color:#2b6f7a;background:rgba(43,170,190,0.08); }
  .pill.err{ color:#ff8080;border-color:rgba(255,77,77,0.3);background:rgba(255,77,77,0.06); }
  .pill.connected{ color:#4ade80;border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.08); }
  .pill.connecting{ color:var(--amber);border-color:rgba(255,183,77,0.3);background:rgba(255,183,77,0.06); }
  #editBtn{ margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
    padding:5px 12px;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,0.02);cursor:pointer; }
  #editBtn.active{ color:#0a0a0c;background:var(--cyan);border-color:var(--cyan);font-weight:700; }

  /* GRID */
  #grid{ position:fixed;inset:0;
    padding-top:calc(env(safe-area-inset-top) + var(--topbar-h));
    padding-bottom:env(safe-area-inset-bottom,8px);
    overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch; }
  #gridInner{ display:grid;grid-template-columns:repeat(4,1fr);
    grid-auto-rows:minmax(80px,auto);gap:6px;padding:6px; }

  @media (orientation:landscape){
    :root{ --topbar-h:38px; }
    #gridInner{ grid-template-columns:repeat(6,1fr);grid-auto-rows:minmax(60px,auto);gap:5px;padding:5px; }
    .topbar{ padding-top:max(4px,env(safe-area-inset-top));padding-bottom:4px; }
    .pill{ font-size:11px;padding:4px 8px; }
    #editBtn{ font-size:11px;padding:4px 10px; }
  }

  /* TILES */
  .tile{ position:relative;border-radius:12px;background:var(--panel);
    border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:6px;overflow:hidden;
    -webkit-touch-callout:none;
    transition:box-shadow .15s ease,opacity .2s ease,transform .15s ease; }
  .tile.size-1x1{ grid-column:span 1;grid-row:span 1; }
  .tile.size-2x2{ grid-column:span 2;grid-row:span 2; }
  .tile.size-2x1{ grid-column:span 2;grid-row:span 1; }

  /* editing states */
  .tile.editing{ animation:jiggle 0.4s ease-in-out infinite; }
  @keyframes jiggle{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-0.7deg);}75%{transform:rotate(0.7deg);}}

  /* selected for drag */
  .tile.drag-selected{
    animation:none !important;
    box-shadow:0 0 0 2px var(--cyan), 0 0 20px rgba(55,224,230,0.3) !important;
    transform:scale(1.03);
    z-index:20;
    transition:box-shadow .1s, transform .1s;
  }
  .tile.drag-over{ box-shadow:inset 0 0 0 2px var(--amber);background:rgba(255,183,77,0.05); }

  .remove-badge{ position:absolute;top:5px;right:5px;width:20px;height:20px;
    border-radius:50%;background:#ff4d4d;color:#fff;
    align-items:center;justify-content:center;
    font-size:13px;font-weight:700;z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);display:none; }
  .tile.editing .remove-badge{ display:flex; }

  .add-tile{ border-style:dashed;border-color:rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.015);color:var(--muted);font-size:28px;cursor:pointer;
    animation:none !important; }

  /* TILE CONTENT */
  .tile-label{ font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--param-color,var(--muted));margin-bottom:1px;text-align:center;
    white-space:normal;word-break:break-word;line-height:1.2;max-width:100%;font-weight:700; }
  .tile-value{ font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
    line-height:1;color:#fff;font-size:clamp(16px,6vw,32px);letter-spacing:1px; }
  .tile-unit{ font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px; }
  .tile-underline{ width:55%;height:1px;background:var(--param-color,var(--cyan));opacity:0.5;margin:3px 0; }
  .size-2x2 .tile-value{ font-size:clamp(28px,8vw,54px); }
  @media (orientation:landscape){
    .tile-value{ font-size:clamp(14px,4.5vw,28px); }
    .size-2x2 .tile-value{ font-size:clamp(24px,6vw,44px); }
  }

  /* GAUGE */
  .gauge-wrap{ position:relative;width:100%;height:100%;min-height:60px;
    display:flex;align-items:center;justify-content:center; }
  .gauge-svg{ position:absolute;inset:0;width:100%;height:100%; }
  .gauge-center{ display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2; }
  .gauge-bg{ fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6; }
  .gauge-fg{ fill:none;stroke:var(--param-color,var(--cyan));stroke-width:6;stroke-linecap:round; }

  /* MODALS */
  .modal-backdrop{ position:fixed;inset:0;background:rgba(0,0,0,0.75);
    backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-end;
    justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease; }
  .modal-backdrop.show{ opacity:1;pointer-events:auto; }
  .modal-sheet{ width:100%;max-width:640px;background:#15151a;border:1px solid var(--line);
    border-radius:18px 18px 0 0;max-height:82vh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.9,.3,1);
    padding-bottom:env(safe-area-inset-bottom); }
  .modal-backdrop.show .modal-sheet{ transform:translateY(0); }
  .modal-header{ padding:14px 16px 10px;display:flex;align-items:center;
    justify-content:space-between;border-bottom:1px solid var(--line); }
  .modal-header h3{ margin:0;font-size:15px;letter-spacing:1px;font-weight:600; }
  .modal-close{ border:none;background:rgba(255,255,255,0.06);color:var(--text);
    width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer; }
  .modal-body{ overflow-y:auto;padding:8px 12px; }
  .group-title{ font-size:10px;letter-spacing:2px;color:var(--muted);
    text-transform:uppercase;padding:8px 6px 4px; }
  .param-list{ display:flex;flex-direction:column;gap:3px; }
  .param-item{ display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.03);
    border:1px solid transparent;font-size:14px;cursor:pointer; }
  .param-item.selected{ border-color:var(--cyan);background:rgba(55,224,230,0.08); }
  .param-item .pname{ font-weight:600; }
  .param-item .pcode{ color:var(--muted);font-size:11px;font-family:monospace;margin-left:6px; }
  .param-item .check{ width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0; }
  .param-item.selected .check{ border-color:var(--cyan);background:var(--cyan);color:#0a0a0c; }
  .style-row,.size-row{ display:flex;gap:6px;padding:8px 6px;flex-wrap:wrap; }
  .style-btn{ flex:1;min-width:70px;border:1px solid var(--line);border-radius:10px;
    padding:9px 6px;text-align:center;font-size:12px;
    background:rgba(255,255,255,0.03);color:var(--muted);cursor:pointer; }
  .style-btn.selected{ border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.08); }
  .delete-row{ padding:4px 6px 14px; }
  .delete-btn{ width:100%;padding:11px;border-radius:10px;
    border:1px solid rgba(255,77,77,0.3);background:rgba(255,77,77,0.08);
    color:#ff8080;font-size:14px;font-weight:600;cursor:pointer; }

  ::-webkit-scrollbar{ width:3px;height:3px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15);border-radius:2px; }

  .hint-toast{ position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:rgba(20,20,24,0.95);border:1px solid var(--line);
    padding:7px 16px;border-radius:20px;font-size:12px;color:var(--muted);
    z-index:80;opacity:0;transition:opacity .3s ease;pointer-events:none;white-space:nowrap; }
  .hint-toast.show{ opacity:1; }

  #bleLog{ position:fixed;bottom:54px;left:8px;right:8px;background:rgba(0,0,0,0.9);
    border:1px solid var(--line);border-radius:10px;padding:7px 10px;
    font-family:monospace;font-size:11px;color:#4ade80;z-index:70;
    max-height:90px;overflow-y:auto;display:none; }
  #bleLog.show{ display:block; }
</style>
</head>
<body>

<div class="topbar">
  <button id="connectBtn" class="pill">🔵 Connect</button>
  <div id="bleStatus" class="pill">bLink3</div>
  <button id="pipBtn" class="pill">PiP</button>
  <button id="editBtn">Налаштувати</button>
</div>

<div id="grid"><div id="gridInner"></div></div>
<div id="bleLog"></div>
<div class="hint-toast" id="hintToast"></div>

<canvas id="pipCanvas" width="480" height="220" style="display:none;"></canvas>
<video id="pipVideo" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;" muted playsinline></video>

<div class="modal-backdrop" id="pipModalBackdrop">
  <div class="modal-sheet">
    <div class="modal-header"><h3>PiP — налаштування</h3><button class="modal-close" id="pipModalClose">✕</button></div>
    <div class="modal-body" id="pipModalBody"></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-header"><h3 id="modalTitle">Вибрати параметр</h3><button class="modal-close" id="modalClose">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ── PARAMS ── */
const PARAMS = {
  // ECU params (from AMS table)
  'RPM':      { name:'RPM',         off:26,  size:2, scale:1,        bias:0,   unit:'rpm',  min:0,   max:9000, color:'#ffd23f', src:'ble' },
  'T_Eng':    { name:'T_Eng',       off:33,  size:1, scale:1,        bias:28,  unit:'°C',   min:0,   max:130,  color:'#3b82f6', src:'ble' },
  'T_Air':    { name:'T_Air',       off:24,  size:1, scale:1,        bias:28,  unit:'°C',   min:-20, max:80,   color:'#37e0e6', src:'ble' },
  'AFR':      { name:'AFR',         off:20,  size:1, scale:10,       bias:0,   unit:'AFR',  min:10,  max:18,   color:'#ffb74d', src:'ble' },
  'AFR_WBO2': { name:'AFR WBO2',    off:55,  size:2, scale:100,      bias:0,   unit:'AFR',  min:10,  max:18,   color:'#ff9f43', src:'ble' },
  'SA':       { name:'SA',          off:25,  size:1, scale:1,        bias:128, unit:'°',    min:-30, max:50,   color:'#ff6b81', src:'ble' },
  'TPS':      { name:'TPS%',        off:34,  size:1, scale:2.55,     bias:0,   unit:'%',    min:0,   max:100,  color:'#37e0e6', src:'ble' },
  'TPS_indx': { name:'TPS indx',    off:28,  size:1, scale:1,        bias:0,   unit:'cnt',  min:0,   max:255,  color:'#37e0e6', src:'ble' },
  'Volt':     { name:'Volt Batt',   off:29,  size:1, scale:10,       bias:0,   unit:'V',    min:10,  max:16,   color:'#4ade80', src:'ble' },
  'Fuel_CL':  { name:'Fuel CL',     off:22,  size:2, scale:5.12,     bias:512, unit:'%',    min:-25, max:25,   color:'#4ade80', src:'ble' },
  'Cyl1_AP':  { name:'Cyl1 Eng AP', off:45,  size:2, scale:256,      bias:0,   unit:'kPa',  min:0,   max:110,  color:'#37e0e6', src:'ble' },
  'Veh_Spd':  { name:'Veh Speed',   off:51,  size:2, scale:256,      bias:0,   unit:'km/h', min:0,   max:300,  color:'#37e0e6', src:'ble' },
  'Gear':     { name:'Gear',        off:130, size:1, scale:1,        bias:0,   unit:'',     min:0,   max:6,    color:'#3b82f6', src:'ble' },
  'EGT':      { name:'EGT',         off:91,  size:2, scale:1,        bias:0,   unit:'°C',   min:0,   max:1000, color:'#ff4d4d', src:'ble' },
  'P_Atm':    { name:'Atm Press',   off:44,  size:1, scale:1,        bias:0,   unit:'kPa',  min:80,  max:110,  color:'#8a8a92', src:'ble' },
  'FuelPW':   { name:'Fuel PW',     off:35,  size:2, scale:289.0625, bias:0,   unit:'ms',   min:0,   max:20,   color:'#ffb74d', src:'ble' },
  'Inj_Rate': { name:'Inj Rate',    off:82,  size:1, scale:2.56,     bias:0,   unit:'%',    min:0,   max:100,  color:'#ff9f43', src:'ble' },
  // Phone GPS params
  'GPS_Phone': { name:'GPS Speed',  off:-1,  size:0, scale:1,        bias:0,   unit:'km/h', min:0,   max:300,  color:'#37e0e6', src:'gps' },
  'Altitude':  { name:'Altitude',   off:-1,  size:0, scale:1,        bias:0,   unit:'m',    min:0,   max:3000, color:'#8a8a92', src:'gps' },
};

const PARAM_GROUPS = [
  { title:'Двигун',    codes:['RPM','T_Eng','T_Air','SA','Gear','EGT','P_Atm'] },
  { title:'Паливо',    codes:['AFR','AFR_WBO2','Fuel_CL','FuelPW','Inj_Rate'] },
  { title:'Дросель',   codes:['TPS','TPS_indx','Cyl1_AP'] },
  { title:'Швидкість', codes:['GPS_Phone','Veh_Spd'] },
  { title:'Електрика', codes:['Volt'] },
  { title:'Телефон GPS', codes:['GPS_Phone','Altitude'] },
];

const liveValues = {};
Object.keys(PARAMS).forEach(k => liveValues[k] = '--');

/* ── PHONE GPS ── */
let gpsWatchId = null;

function startGPS(){
  if(!navigator.geolocation || gpsWatchId !== null) return;
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    const spd = pos.coords.speed !== null ? Math.round(pos.coords.speed * 3.6 * 10) / 10 : 0;
    liveValues['GPS_Phone'] = spd;
    const alt = pos.coords.altitude !== null ? Math.round(pos.coords.altitude) : '--';
    liveValues['Altitude'] = alt;
    updateDisplay();
  }, err => {
    liveValues['GPS_Phone'] = 'GPS?';
    liveValues['Altitude'] = 'GPS?';
  }, { enableHighAccuracy: true, maximumAge: 1000 });
}
// start GPS immediately
startGPS();

/* ── BLE ── */
let bleDevice=null, bleChar=null, rxBuffer=new Uint8Array(0), bleConnected=false;
const SVC_UUID='0000ffe0-0000-1000-8000-00805f9b34fb';
const CHR_UUID='0000ffe1-0000-1000-8000-00805f9b34fb';

function appendBuf(a,b){ const c=new Uint8Array(a.length+b.length); c.set(a); c.set(b,a.length); return c; }

function tryParse(buf){
  for(let s=0;s<buf.length-20;s++){
    for(let l=20;l<=Math.min(200,buf.length-s-1);l++){
      let sum=0; for(let i=s;i<s+l;i++) sum+=buf[i];
      if(buf[s+l]===((256-(sum&0xFF))&0xFF)) return {payload:buf.slice(s,s+l),consumed:s+l+1};
    }
  }
  return null;
}

function parsePayload(payload){
  logBle('Pkt '+payload.length+'B: '+Array.from(payload.slice(0,8)).map(b=>b.toString(16).padStart(2,'0')).join(' ')+'…');
  Object.entries(PARAMS).forEach(([code,p])=>{
    if(p.src!=='ble') return;
    if(p.off+p.size>payload.length) return;
    let raw=0; for(let i=0;i<p.size;i++) raw=(raw<<8)|payload[p.off+i];
    const val=(raw-p.bias)/p.scale;
    liveValues[code]=(p.unit==='rpm'||p.unit==='')?Math.round(val):Math.round(val*10)/10;
  });
  updateDisplay();
}

function onBleData(e){
  const chunk=new Uint8Array(e.target.value.buffer);
  rxBuffer=appendBuf(rxBuffer,chunk);
  if(rxBuffer.length>1024) rxBuffer=rxBuffer.slice(rxBuffer.length-512);
  const r=tryParse(rxBuffer);
  if(r){ parsePayload(r.payload); rxBuffer=rxBuffer.slice(r.consumed); }
}

async function connectBLE(){
  const btn=document.getElementById('connectBtn');
  if(bleConnected){
    try{ bleDevice&&bleDevice.gatt.disconnect(); }catch(e){}
    bleConnected=false; btn.textContent='🔵 Connect'; btn.className='pill';
    document.getElementById('bleStatus').textContent='bLink3';
    document.getElementById('bleStatus').className='pill'; return;
  }
  btn.textContent='⏳…'; btn.className='pill connecting';
  try{
    bleDevice=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'bLink'}],optionalServices:[SVC_UUID]});
    bleDevice.addEventListener('gattserverdisconnected',onBleDisc);
    const srv=await bleDevice.gatt.connect();
    const svc=await srv.getPrimaryService(SVC_UUID);
    bleChar=await svc.getCharacteristic(CHR_UUID);
    bleChar.addEventListener('characteristicvaluechanged',onBleData);
    await bleChar.startNotifications();
    bleConnected=true;
    btn.textContent='🟢 '+(bleDevice.name||'OK'); btn.className='pill connected';
    document.getElementById('bleStatus').textContent='● LIVE';
    document.getElementById('bleStatus').className='pill on';
    logBle('Connected to '+bleDevice.name);
    showHint('Підключено до '+bleDevice.name);
  }catch(e){
    bleConnected=false; btn.textContent='🔵 Connect'; btn.className='pill';
    document.getElementById('bleStatus').textContent='Error';
    document.getElementById('bleStatus').className='pill err';
    logBle('Err: '+e.message); showHint('Помилка: '+e.message);
  }
}
function onBleDisc(){
  bleConnected=false;
  document.getElementById('connectBtn').textContent='🔵 Connect';
  document.getElementById('connectBtn').className='pill';
  document.getElementById('bleStatus').textContent='Disconnected';
  document.getElementById('bleStatus').className='pill err';
  logBle('Disconnected');
}
document.getElementById('connectBtn').addEventListener('click',connectBLE);

let logVisible=false;
const bleLogEl=document.getElementById('bleLog');
function logBle(m){ bleLogEl.innerHTML+=m+'<br>'; bleLogEl.scrollTop=bleLogEl.scrollHeight; }
let logTimer;
document.getElementById('connectBtn').addEventListener('pointerdown',()=>{
  logTimer=setTimeout(()=>{ logVisible=!logVisible; bleLogEl.classList.toggle('show',logVisible); },800);
});
document.getElementById('connectBtn').addEventListener('pointerup',()=>clearTimeout(logTimer));

/* ── LAYOUT ── */
function loadLayout(){ try{ const s=localStorage.getItem('aracer_layout'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function saveLayout(){ try{ localStorage.setItem('aracer_layout',JSON.stringify(layout)); }catch(e){} }

function defaultLayout(){
  return [
    // Row 1
    {id:'t1', param:'T_Eng',    style:'flat',  size:'2x2'},
    {id:'t2', param:'GPS_Phone',style:'flat',  size:'2x2'},
    // Row 2
    {id:'t3', param:'TPS',      style:'flat',  size:'2x1'},
    {id:'t4', param:'Inj_Rate', style:'flat',  size:'2x1'},
    // Row 3
    {id:'t5', param:'Volt',     style:'flat',  size:'2x1'},
    {id:'t6', param:'Altitude', style:'flat',  size:'1x1'},
    {id:'t7', param:'T_Air',    style:'flat',  size:'1x1'},
  ];
}

let layout=loadLayout()||defaultLayout();
let editMode=false, nextId=20;
const gridInner=document.getElementById('gridInner');

/* ── RENDER ── */
function render(){
  gridInner.innerHTML='';
  layout.forEach(tile=>gridInner.appendChild(renderTile(tile)));
  if(editMode){
    const add=document.createElement('div');
    add.className='tile add-tile size-1x1'; add.textContent='+';
    add.addEventListener('click',()=>openPicker(null));
    gridInner.appendChild(add);
  }
}

function renderTile(tile){
  const p=PARAMS[tile.param];
  const el=document.createElement('div');
  el.className=`tile size-${tile.size} ${editMode?'editing':''}`;
  el.dataset.id=tile.id;
  el.style.setProperty('--param-color',p.color);

  const rb=document.createElement('div'); rb.className='remove-badge'; rb.textContent='✕';
  rb.addEventListener('click',e=>{
    e.stopPropagation();
    layout=layout.filter(t=>t.id!==tile.id); saveLayout(); render();
  });
  el.appendChild(rb);
  el.appendChild(tile.style==='gauge'?buildGauge(tile,p):buildFlat(tile,p));
  attachInteractions(el,tile);
  return el;
}

function buildFlat(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const lbl=document.createElement('div'); lbl.className='tile-label'; lbl.textContent=p.name;
  const ul=document.createElement('div'); ul.className='tile-underline';
  const val=document.createElement('div'); val.className='tile-value';
  val.dataset.live=tile.param; val.textContent=liveValues[tile.param];
  const unit=document.createElement('div'); unit.className='tile-unit'; unit.textContent=p.unit;
  w.append(lbl,ul,val); if(p.unit) w.append(unit);
  return w;
}

function buildGauge(tile,p){
  const wrap=document.createElement('div'); wrap.className='gauge-wrap';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100'); svg.classList.add('gauge-svg');
  const r=42,C=2*Math.PI*r;
  const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','50');bg.setAttribute('cy','50');bg.setAttribute('r',r);bg.classList.add('gauge-bg');
  bg.setAttribute('stroke-dasharray',`${C*0.75} ${C}`);bg.setAttribute('stroke-dashoffset',C*0.125);bg.setAttribute('transform','rotate(90 50 50)');
  const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fg.setAttribute('cx','50');fg.setAttribute('cy','50');fg.setAttribute('r',r);fg.classList.add('gauge-fg');
  fg.setAttribute('transform','rotate(90 50 50)');
  fg.dataset.live=tile.param; fg.dataset.r=r; fg.dataset.c=C;
  svg.append(bg,fg);
  const center=document.createElement('div'); center.className='gauge-center';
  const lbl=document.createElement('div'); lbl.className='tile-label'; lbl.textContent=p.name;
  const val=document.createElement('div'); val.className='tile-value';
  val.dataset.live=tile.param; val.textContent=liveValues[tile.param];
  const unit=document.createElement('div'); unit.className='tile-unit'; unit.textContent=p.unit;
  center.append(lbl,val); if(p.unit) center.append(unit);
  wrap.append(svg,center);
  updateGaugeFg(fg,p,liveValues[tile.param]);
  return wrap;
}

function updateGaugeFg(fg,p,v){
  if(v==='--'||v==='GPS?') return;
  const r=parseFloat(fg.dataset.r),C=parseFloat(fg.dataset.c);
  const pct=Math.max(0,Math.min(1,(v-p.min)/(p.max-p.min)));
  fg.setAttribute('stroke-dasharray',`${C*0.75*pct} ${C}`);
  fg.setAttribute('stroke-dashoffset',C*0.125);
}

function updateDisplay(){
  document.querySelectorAll('[data-live]').forEach(el=>{
    const code=el.dataset.live,p=PARAMS[code]; if(!p) return;
    const v=liveValues[code];
    if(el.tagName==='circle') updateGaugeFg(el,p,v);
    else el.textContent=v;
  });
}

/* ── DRAG: подвійний тап = виділити, потім тягнути ── */
let dragSelected=null; // id вибраної плитки
let editMode_=false;

function attachInteractions(el,tile){
  let tapCount=0, tapTimer=null, tapStart=0;
  let isDragging=false, dragStartX=0, dragStartY=0;

  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.remove-badge')) return;
    tapStart=Date.now();
    dragStartX=e.clientX; dragStartY=e.clientY;

    // якщо плитка вже вибрана — починаємо drag
    if(editMode && dragSelected===tile.id){
      isDragging=true;
      el.setPointerCapture(e.pointerId);
      e.preventDefault();
    }
  });

  el.addEventListener('pointermove',e=>{
    if(!isDragging) return;
    e.preventDefault();
    const dx=Math.abs(e.clientX-dragStartX), dy=Math.abs(e.clientY-dragStartY);
    if(dx<4&&dy<4) return;
    const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.tile:not(.add-tile)');
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    if(target&&target.dataset.id&&target.dataset.id!==tile.id){
      target.classList.add('drag-over');
      el._overTarget=target.dataset.id;
    } else {
      el._overTarget=null;
    }
  });

  el.addEventListener('pointerup',e=>{
    e.preventDefault();
    const dt=Date.now()-tapStart;

    if(isDragging){
      isDragging=false;
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      if(el._overTarget){
        const fi=layout.findIndex(t=>t.id===tile.id);
        const ti=layout.findIndex(t=>t.id===el._overTarget);
        if(fi>=0&&ti>=0){ const [m]=layout.splice(fi,1); layout.splice(ti,0,m); saveLayout(); }
        el._overTarget=null;
      }
      // деселект після drop
      dragSelected=null;
      render(); return;
    }

    if(dt>500) return; // long press — ignore

    // tap logic
    tapCount++;
    if(tapCount===1){
      tapTimer=setTimeout(()=>{
        tapCount=0;
        if(editMode){
          // single tap in edit = select/deselect for drag
          if(dragSelected===tile.id){
            dragSelected=null;
            el.classList.remove('drag-selected');
            showHint('Скасовано');
          } else {
            // deselect previous
            document.querySelectorAll('.drag-selected').forEach(x=>x.classList.remove('drag-selected'));
            dragSelected=tile.id;
            el.classList.add('drag-selected');
            showHint('Тягни плитку куди хочеш');
          }
        } else {
          openPicker(tile);
        }
      },220);
    } else if(tapCount===2){
      clearTimeout(tapTimer); tapCount=0;
      if(!editMode){
        enterEditMode();
        setTimeout(()=>{
          document.querySelectorAll('.drag-selected').forEach(x=>x.classList.remove('drag-selected'));
          dragSelected=tile.id;
          const found=document.querySelector(`[data-id="${tile.id}"]`);
          if(found){ found.classList.add('drag-selected'); showHint('Тягни плитку куди хочеш'); }
        },50);
      } else {
        openPicker(tile);
      }
    }
  });

  el.addEventListener('pointercancel',()=>{
    isDragging=false;
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    dragSelected=null; render();
  });
}

/* ── EDIT MODE ── */
function enterEditMode(){
  editMode=true;
  document.getElementById('editBtn').className='active';
  document.getElementById('editBtn').textContent='Готово';
  showHint('2× тап — перемістити • 1× тап — вибрати плитку');
  render();
}
function exitEditMode(){
  editMode=false; dragSelected=null;
  document.getElementById('editBtn').className='';
  document.getElementById('editBtn').textContent='Налаштувати';
  render();
}
document.getElementById('editBtn').addEventListener('click',()=>editMode?exitEditMode():enterEditMode());

/* ── PICKER ── */
const backdrop=document.getElementById('modalBackdrop');
let pickerTarget=null;

function openPicker(tile){
  pickerTarget=tile;
  document.getElementById('modalTitle').textContent=tile?'Змінити плитку':'Додати плитку';
  buildPickerBody(); backdrop.classList.add('show');
}
function closePicker(){ backdrop.classList.remove('show'); pickerTarget=null; }
document.getElementById('modalClose').addEventListener('click',closePicker);
backdrop.addEventListener('click',e=>{ if(e.target===backdrop) closePicker(); });

function buildPickerBody(){
  const body=document.getElementById('modalBody'); body.innerHTML='';
  const cur=pickerTarget?.param, curStyle=pickerTarget?.style||'flat', curSize=pickerTarget?.size||'1x1';

  // unique groups (remove duplicate GPS_Phone)
  const shown = new Set();
  PARAM_GROUPS.forEach(g=>{
    const gt=document.createElement('div'); gt.className='group-title'; gt.textContent=g.title; body.appendChild(gt);
    const list=document.createElement('div'); list.className='param-list';
    g.codes.forEach(code=>{
      if(shown.has(code)) return; shown.add(code);
      const p=PARAMS[code]; if(!p) return;
      const item=document.createElement('div');
      item.className='param-item'+(code===cur?' selected':'');
      item.innerHTML=`<div><span class="pname">${p.name}</span><span class="pcode">${p.unit}</span></div><div class="check">✓</div>`;
      item.addEventListener('click',()=>selectParam(code));
      list.appendChild(item);
    });
    body.appendChild(list);
  });

  const st=document.createElement('div'); st.className='group-title'; st.textContent='Стиль'; body.appendChild(st);
  const sr=document.createElement('div'); sr.className='style-row';
  [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
    const b=document.createElement('div'); b.className='style-btn'+(curStyle===v?' selected':'');
    b.textContent=l; b.addEventListener('click',()=>selectStyle(v)); sr.appendChild(b);
  }); body.appendChild(sr);

  const szt=document.createElement('div'); szt.className='group-title'; szt.textContent='Розмір'; body.appendChild(szt);
  const szr=document.createElement('div'); szr.className='size-row';
  [['1x1','Малий 1×1'],['2x1','Широкий 2×1'],['2x2','Великий 2×2']].forEach(([v,l])=>{
    const b=document.createElement('div'); b.className='style-btn'+(curSize===v?' selected':'');
    b.textContent=l; b.addEventListener('click',()=>selectSize(v)); szr.appendChild(b);
  }); body.appendChild(szr);

  if(pickerTarget){
    const dr=document.createElement('div'); dr.className='delete-row';
    const db=document.createElement('button'); db.className='delete-btn'; db.textContent='🗑 Видалити плитку';
    db.addEventListener('click',()=>{ layout=layout.filter(t=>t.id!==pickerTarget.id); saveLayout(); closePicker(); render(); });
    dr.appendChild(db); body.appendChild(dr);
  }
}

function selectParam(code){
  if(pickerTarget){ pickerTarget.param=code; }
  else { pickerTarget={id:'t'+(nextId++),param:code,style:'flat',size:'1x1'}; layout.push(pickerTarget); }
  saveLayout(); buildPickerBody(); render();
}
function selectStyle(v){ if(pickerTarget){ pickerTarget.style=v; saveLayout(); buildPickerBody(); render(); } }
function selectSize(v){ if(pickerTarget){ pickerTarget.size=v; saveLayout(); buildPickerBody(); render(); } }

function showHint(msg){
  const t=document.getElementById('hintToast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── PIP ── */
function loadPipConfig(){ try{ const s=localStorage.getItem('aracer_pip'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function savePipConfig(){ try{ localStorage.setItem('aracer_pip',JSON.stringify(pipConfig)); }catch(e){} }
let pipConfig=loadPipConfig()||{big:'RPM',small1:'T_Eng',small2:'GPS_Phone'};

const pipCanvas=document.getElementById('pipCanvas');
const pipVideo=document.getElementById('pipVideo');
const ctx=pipCanvas.getContext('2d');
let pipInterval=null;

function drawPip(){
  const W=pipCanvas.width, H=pipCanvas.height;
  ctx.fillStyle='#0a0a0c'; ctx.fillRect(0,0,W,H);
  const big=PARAMS[pipConfig.big];
  const s1=PARAMS[pipConfig.small1];
  const s2=PARAMS[pipConfig.small2];
  const divX=W*0.58;

  // Big param
  ctx.fillStyle=big.color; ctx.font='bold 16px sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(big.name, 12, 10);
  ctx.fillStyle='#fff'; ctx.font='bold 86px monospace'; ctx.textBaseline='middle';
  ctx.fillText(String(liveValues[pipConfig.big]), 8, H*0.60);

  // Divider
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(divX,8); ctx.lineTo(divX,H-8); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.moveTo(divX+6,H/2); ctx.lineTo(W-6,H/2); ctx.stroke();

  // Small params
  [[s1,pipConfig.small1,0],[s2,pipConfig.small2,1]].forEach(([p,code,i])=>{
    const yTop=i===0?8:H/2+6;
    const yMid=yTop+(H/2-14)/2;
    ctx.fillStyle=p.color; ctx.font='bold 14px sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(p.name, divX+10, yTop+4);
    ctx.fillStyle='#fff'; ctx.font='bold 38px monospace'; ctx.textBaseline='middle';
    ctx.fillText(String(liveValues[code]), divX+10, yMid+20);
  });
}

async function startPip(){
  if(!('requestPictureInPicture' in document.createElement('video'))){ showHint('PiP не підтримується'); return; }
  drawPip();
  const stream=pipCanvas.captureStream(10);
  pipVideo.srcObject=stream;
  if(pipInterval) clearInterval(pipInterval);
  pipInterval=setInterval(drawPip,500);
  try{
    await pipVideo.play();
    if(document.pictureInPictureElement) await document.exitPictureInPicture();
    else await pipVideo.requestPictureInPicture();
  }catch(e){ showHint('PiP: '+e.message); }
}
pipVideo.addEventListener('leavepictureinpicture',()=>{ if(pipInterval){ clearInterval(pipInterval); pipInterval=null; } });

const pipBackdrop=document.getElementById('pipModalBackdrop');
let pipTapCount=0, pipTapTimer=null;
document.getElementById('pipBtn').addEventListener('click',()=>{
  pipTapCount++;
  if(pipTapCount===1){
    pipTapTimer=setTimeout(()=>{ pipTapCount=0; startPip(); },280);
  } else {
    clearTimeout(pipTapTimer); pipTapCount=0;
    buildPipBody(); pipBackdrop.classList.add('show');
  }
});
document.getElementById('pipModalClose').addEventListener('click',()=>pipBackdrop.classList.remove('show'));
pipBackdrop.addEventListener('click',e=>{ if(e.target===pipBackdrop) pipBackdrop.classList.remove('show'); });

function buildPipBody(){
  const body=document.getElementById('pipModalBody'); body.innerHTML='';
  [{key:'big',title:'Велике число'},{key:'small1',title:'Малий 1'},{key:'small2',title:'Малий 2'}].forEach(slot=>{
    const gt=document.createElement('div'); gt.className='group-title'; gt.textContent=slot.title; body.appendChild(gt);
    const list=document.createElement('div'); list.className='param-list';
    Object.entries(PARAMS).forEach(([code,p])=>{
      const item=document.createElement('div');
      item.className='param-item'+(pipConfig[slot.key]===code?' selected':'');
      item.innerHTML=`<div><span class="pname">${p.name}</span><span class="pcode">${p.unit}</span></div><div class="check">✓</div>`;
      item.addEventListener('click',()=>{ pipConfig[slot.key]=code; savePipConfig(); buildPipBody(); });
      list.appendChild(item);
    });
    body.appendChild(list);
  });
  const dr=document.createElement('div'); dr.className='delete-row';
  const sb=document.createElement('button'); sb.className='delete-btn';
  sb.style.cssText='background:rgba(55,224,230,0.1);border-color:rgba(55,224,230,0.3);color:#9be8ff;';
  sb.textContent='▶ Відкрити PiP';
  sb.addEventListener('click',()=>{ pipBackdrop.classList.remove('show'); startPip(); });
  dr.appendChild(sb); body.appendChild(dr);
}

render();
</script>
