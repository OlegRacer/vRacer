<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Speedometer (1px + Clear Cache)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: #ffffff;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 30px;
        }
        button {
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 300px;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        #pipBtn {
            background-color: #007aff;
        }
        #pipBtn:disabled {
            background-color: #3a3a3c;
            color: #aeaeae;
            cursor: not-allowed;
        }
        #clearCacheBtn {
            background-color: #ff453a; /* Червона кнопка для скидання */
            font-size: 14px;
            padding: 10px 20px;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #ecc94b;
        }
        
        canvas { 
            display: none; 
        }

        /* Відео видиме, але розміром 1х1 піксель у кутку */
        #video-container {
            position: fixed;
            bottom: 5px;
            right: 5px;
            width: 1px;
            height: 1px;
            overflow: hidden;
            pointer-events: none;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>

    <h1>GPS у Picture-in-Picture</h1>
    <div id="status">Очікування сигналу GPS...</div>
    
    <div class="btn-container">
        <button id="pipBtn" disabled>Запустити через JS</button>
        <button id="clearCacheBtn">Скинути кеш сторінки</button>
    </div>

    <div id="video-container">
        <video id="video" playsinline muted></video>
    </div>

    <canvas id="canvas" width="300" height="200"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pipBtn = document.getElementById('pipBtn');
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        const statusDiv = document.getElementById('status');

        let currentSpeed = 0;
        let streamInitialized = false;

        function drawSpeedFrame() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Швидкість
            ctx.fillStyle = '#34c759'; 
            ctx.font = 'bold 70px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentSpeed, canvas.width / 2, canvas.height / 2 - 10);

            // Підпис
            ctx.fillStyle = '#aeaeae';
            ctx.font = '20px -apple-system, sans-serif';
            ctx.fillText('км/год', canvas.width / 2, canvas.height / 2 + 50);
        }

        function initStream() {
            drawSpeedFrame();
            
            // 30 FPS потік
            const stream = canvas.captureStream(30); 
            video.srcObject = stream;
            
            streamInitialized = true;
            pipBtn.removeAttribute('disabled');
            statusDiv.innerText = "GPS готовий! Натисніть кнопку.";
            
            // Оновлення раз на секунду
            setInterval(drawSpeedFrame, 1000);
        }

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    if (position.coords.speed !== null && position.coords.speed !== undefined) {
                        currentSpeed = Math.round(position.coords.speed * 3.6);
                    } else {
                        currentSpeed = 0; 
                    }
                    
                    if (!streamInitialized) {
                        initStream();
                    } else {
                        drawSpeedFrame();
                    }
                },
                (error) => { 
                    statusDiv.innerText = `Помилка GPS: ${error.message}`; 
                },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        } else {
            statusDiv.innerText = "Геолокація не підтримується.";
        }

        // Кнопка запуску PiP
        pipBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Запуск трансляції...";
            try {
                await video.play();

                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode("picture-in-picture");
                    statusDiv.innerText = "Віконце PiP відкрито!";
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    statusDiv.innerText = "Віконце PiP відкрито!";
                } else {
                    statusDiv.innerText = "Авто-PiP не підтримується.";
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Помилка запуску. Спробуйте ще раз.";
            }
        });

        // КНОПКА СКИДАННЯ КЕШУ
        clearCacheBtn.addEventListener('click', () => {
            // Очищаємо кеш через додавання унікального timestamp до URL
            localStorage.clear();
            sessionStorage.clear();
            
            // Жорстке перезавантаження сторінки з сервера
            statusDiv.innerText = "Очищення кешу... Перезавантаження...";
            setTimeout(() => {
                window.location.reload(true);
            }, 500);
        });
    </script>
</body>
</html>
