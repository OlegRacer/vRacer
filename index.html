<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash Pro</title>
<style>
:root{
  --bg:#000000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
  --text:#f2f2f0;--muted:#666;
  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000000 !important;color:#f2f2f0 !important;
  font-family:'Rajdhani','Segoe UI',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) 8px 5px;
  background:#000000;border-bottom:1px solid var(--line);
  height:var(--th);}
.pill{border:1px solid var(--line);border-radius:6px;padding:5px 9px;
  font-size:12px;color:var(--muted);background:#0d0d0f;white-space:nowrap;cursor:pointer;}
.pill.on{color:#9be8ff;border-color:#2b6f7a;}
.pill.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);}
.pill.err{color:#ff8080;border-color:rgba(255,77,77,0.3);}
.pill.go{color:var(--amber);border-color:rgba(255,183,77,0.3);}
.pill.sim{color:#c084fc;border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.06);}
#eb{margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
  padding:5px 11px;font-size:12px;color:#f2f2f0;background:#0d0d0f;cursor:pointer;}
#eb.a{color:#000;background:var(--cyan);border-color:var(--cyan);font-weight:700;}
@media(orientation:landscape){
  :root{--th:36px;}
  .pill{font-size:11px;padding:3px 7px;}
  #eb{font-size:11px;padding:3px 9px;}
}

/* GRID */
#grid{position:fixed;inset:0;background:#000000 !important;
  padding-top:calc(env(safe-area-inset-top) + var(--th) + 10px);
  padding-bottom:env(safe-area-inset-bottom,6px);overflow:hidden;}
#gi{display:grid;gap:5px;padding:5px;height:100%;
  grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);}
@media(orientation:landscape){
  #gi{grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,1fr);}
}

/* TILES */
.tile{position:relative;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;overflow:hidden;-webkit-touch-callout:none;will-change:auto;
  transition:background .4s,border-color .4s;}
.tile.s1{grid-column:span 1;grid-row:span 1;}
.tile.s22{grid-column:span 2;grid-row:span 2;}
.tile.s21{grid-column:span 2;grid-row:span 1;}

/* ВІДЕО-ПЛИТКА (Залишаємо оригінальний вигляд, без зайвих масок) */
.video-tile {
  grid-column: span 4;
  grid-row: span 2;
  position: relative;
  background: #0d0d0f;
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  height: 100%;
}
@media(orientation:landscape){
  #gi #dash-video-tile { 
    grid-column: span 6; 
    grid-row: span 2; 
    width: 100%;
  }
  .tile.s1{grid-column:span 2;grid-row:span 1;}
}

/* Alert States */
.tile.cold{background:rgba(59,130,246,0.08)!important;border-color:rgba(59,130,246,0.4)!important;}
.tile.warn{background:rgba(255,211,63,0.07)!important;border-color:rgba(255,211,63,0.45)!important;}
.tile.alrt{background:rgba(255,77,77,0.10)!important;border-color:rgba(255,77,77,0.55)!important;
  animation:palrt 1.1s ease-in-out infinite;}
@keyframes palrt{0%,100%{border-color:rgba(255,77,77,0.55);}50%{border-color:rgba(255,77,77,1);}}
.tile.ed{animation:jig .4s ease-in-out infinite;}
.tile.alrt.ed{animation:jig .4s;}
@keyframes jig{0%,100%{transform:rotate(0)}25%{transform:rotate(-.7deg)}75%{transform:rotate(.7deg)}}
.tile.ds{animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 16px rgba(55,224,230,0.25)!important;transform:scale(1.03);z-index:20;}
.tile.dov{box-shadow:inset 0 0 0 2px var(--amber);}
.rm{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:#ff4d4d;color:#fff;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  z-index:5;display:none;cursor:pointer;}
.tile.ed .rm{display:flex;}
.add{border-style:dashed;border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.01);color:var(--muted);font-size:26px;
  cursor:pointer;animation:none!important;}

/* TILE CONTENT */
.tl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pc,var(--muted));margin-bottom:1px;text-align:center;
  white-space:normal;word-break:break-word;line-height:1.2;font-weight:700;}
.tv{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
  line-height:1;color:#fff;letter-spacing:1px;font-size:clamp(20px,6vw,36px);}
.tu{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.tun{width:50%;height:1px;background:var(--pc,var(--cyan));opacity:0.45;margin:3px 0;}
.s22 .tv{font-size:clamp(32px,8vw,56px);}
.s21 .tv{font-size:clamp(22px,6vw,40px);}
@media(orientation:landscape){
  .tl{font-size:11px;}
  .tv{font-size:clamp(18px,4.5vw,32px);}
  .s22 .tv{font-size:clamp(26px,6vw,44px);}
  .s21 .tv{font-size:clamp(20px,5vw,36px);}
}

/* GAUGE */
.gw{position:relative;width:100%;height:100%;min-height:50px;
  display:flex;align-items:center;justify-content:center;}
.gsvg{position:absolute;inset:0;width:100%;height:100%;}
.gc{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.gbg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5;}
.gfg{fill:none;stroke:var(--pc,var(--cyan));stroke-width:5;stroke-linecap:round;}

/* MODALS */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.82);
  backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;}
.mb.sh{opacity:1;pointer-events:auto;}
.ms{width:100%;max-width:620px;background:#0c0c0f;border:1px solid var(--line);
  border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.9,.3,1);
  padding-bottom:env(safe-area-inset-bottom);}
.mb.sh .ms{transform:translateY(0);}
.mh{padding:12px 14px 9px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.mh h3{margin:0;font-size:14px;letter-spacing:1px;font-weight:600;}
.mc2{border:none;background:rgba(255,255,255,0.05);color:var(--text);
  width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;}
.mbody{overflow-y:auto;padding:6px 11px;flex:1;}
.gt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:7px 5px 3px;}
.pl{display:flex;flex-direction:column;gap:2px;}
.pi{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:9px;background:rgba(255,255,255,0.03);
  border:1px solid transparent;font-size:13px;cursor:pointer;}
.pi.sel{border-color:var(--cyan);background:rgba(55,224,230,0.07);}
.pi .pn2{font-weight:600;}.pi .pc{color:var(--muted);font-size:10px;font-family:monospace;margin-left:5px;}
.pi .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.pi.sel .ck{border-color:var(--cyan);background:var(--cyan);color:#000;}
.sr,.szr{display:flex;gap:5px;padding:7px 5px;flex-wrap:wrap;}
.sb{flex:1;min-width:55px;border:1px solid var(--line);border-radius:9px;
  padding:8px 5px;text-align:center;font-size:11px;
  background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;}
.sb.sel{border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.07);}
.ab{width:100%;padding:10px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;}
.ab.pr{background:rgba(55,224,230,0.1);border:1px solid rgba(55,224,230,0.35);color:#9be8ff;}
.ab.dn{background:rgba(255,77,77,0.07);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
.tbar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:600;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.a{color:var(--cyan);border-bottom-color:var(--cyan);}
.ht{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);border:1px solid var(--line);
  padding:6px 14px;border-radius:18px;font-size:11px;color:var(--muted);
  z-index:80;opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
.ht.sh{opacity:1;}
#blog{position:fixed;bottom:48px;left:7px;right:7px;background:rgba(0,0,0,0.97);
  border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:monospace;font-size:10px;color:#4ade80;z-index:70;
  max-height:80px;overflow-y:auto;display:none;}
#blog.sh{display:block;}
</style>
</head>
<body>

<div class="tb">
  <button id="cb" class="pill">🔵 Connect</button>
  <div id="bs" class="pill">bLink3</div>
  <button id="resetBtn" class="pill">Скинути</button>
  <button id="pipBtnTop" class="pill">PiP</button>
  <button id="eb">Налаштувати</button>
</div>

<div id="grid">
  <div id="gi">
    <div id="dash-video-tile" class="video-tile">
      <video id="pip-video" playsinline muted style="width:100%; height:100%; object-fit:cover; background:#000;"></video>
    </div>
  </div>
</div>

<div id="blog"></div>
<div class="ht" id="ht"></div>

<div class="mb" id="em">
  <div class="ms">
    <div class="mh"><h3>Налаштувати</h3><button class="mc2" id="emc">✕</button></div>
    <div class="tbar">
      <div class="tab a" id="t0" onclick="st(0)">ЕКРАН</div>
      <div class="tab" id="t1" onclick="st(1)">СИГНАЛИ</div>
    </div>
    <div class="mbody" id="emb"></div>
  </div>
</div>

<div class="mb" id="pm">
  <div class="ms">
    <div class="mh"><h3 id="pt">Параметр</h3><button class="mc2" id="pmc">✕</button></div>
    <div class="mbody" id="pb"></div>
  </div>
</div>

<canvas id="pip-canvas" style="display: none;"></canvas>

<script>
const P={
  RPM:      {n:'RPM',      o:-1, s:0,sc:1,    b:0,  u:'rpm', mn:0,   mx:9000,c:'#ffd23f',src:'ble'},
  T_Eng:    {n:'T_Eng',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:0,   mx:130, c:'#3b82f6',src:'ble'},
  TPS:      {n:'TPS%',    o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#37e0e6',src:'ble'},
  GPS:      {n:'GPS',     o:-1, s:0,sc:1,    b:0,  u:'km/h',mn:0,   mx:300, c:'#37e0e6',src:'gps'},
  Volt:     {n:'Volt',    o:-1, s:0,sc:1,    b:0,  u:'V',   mn:10,  mx:16,  c:'#4ade80',src:'ble'},
  T_Air:    {n:'T_Air',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:-20, mx:80,  c:'#06b6d4',src:'ble'},
  Inj_Rate: {n:'Inj Rate',o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#ff9f43',src:'ble'},
  MAP:      {n:'Cyl1 AP',  o:-1, s:0,sc:1,    b:0,  u:'psi',  mn:0,  mx:100, c:'#a29bfe',src:'ble'},
};
const PG=[
  {t:'Всі параметри', k:['RPM','T_Eng','TPS','GPS','Volt','T_Air','Inj_Rate','MAP']},
];
const V={};Object.keys(P).forEach(k=>V[k]=k==='RPM'?0:'--');

function lg(k){try{const s=localStorage.getItem('ar_'+k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem('ar_'+k,JSON.stringify(v));}catch(e){}}

const DA={T_cold:64,T_warn:90,T_crit:96,Volt_warn:12.5,Volt_crit:11.8,Spd_limit:60,Spd_enabled:true};
let AL=lg('al')||{...DA};

let TC=lg('tpscal')||{min:0,max:170};
let _tpsRawLast=null;
let _tpsLiveTimer=null;

let audioCtx=null;
function gac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

let alrtSnd=false,alrtInt=null;
function beepAlert(){
  try{
    const ac=gac(),t=ac.currentTime;
    [[2600,0,.12],[1800,.16,.12],[2600,.32,.12]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.75,t+st+.01);
      g.gain.linearRampToValueAtTime(0.75,t+st+d-.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}
function startAlert(){if(alrtSnd)return;alrtSnd=true;beepAlert();alrtInt=setInterval(beepAlert,1000);}
function stopAlert(){if(!alrtSnd)return;alrtSnd=false;clearInterval(alrtInt);alrtInt=null;}

let spdBeepDone=false;
function beepSpeed(){
  try{
    const ac=gac(),t=ac.currentTime;
    [[880,0,.15],[1109,0,.15],[880,.18,.15],[1109,.18,.15]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.4,t+st+.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}

const alertState={};
function getAlertState(k,v){
  if(v==='--'||isNaN(parseFloat(v)))return'';
  const fv=parseFloat(v);
  const spdLim=parseFloat(AL.Spd_limit)||60;
  if(k==='T_Eng'){
    if(fv>=AL.T_crit)return'alrt';
    if(fv>=AL.T_warn)return'warn';
    if(fv<AL.T_cold)return'cold';
  }else if(k==='Volt'){
    if(fv<=AL.Volt_crit)return'alrt';
    if(fv<=AL.Volt_warn)return'warn';
  }else if(k==='GPS'){
    if(AL.Spd_enabled===false)return'';
    if(fv>=spdLim)return'alrt';
  }
  return'';
}

function ca(){
  let needAlert=false;
  const spd=parseFloat(V.GPS);
  const spdLim=parseFloat(AL.Spd_limit)||60;
  lay.forEach(tile=>{
    const st=getAlertState(tile.k,V[tile.k]);
    alertState[tile.id]=st;
    if(st==='alrt'&&(tile.k==='T_Eng'||tile.k==='Volt'))needAlert=true;
  });
  document.querySelectorAll('.tile[data-id]').forEach(el=>{
    el.classList.remove('cold','warn','alrt');
    const s=alertState[el.dataset.id];
    if(s)el.classList.add(s);
  });
  if(needAlert)startAlert();else stopAlert();
  const overLim=AL.Spd_enabled!==false&&!isNaN(spd)&&spd>=spdLim;
  if(overLim&&!spdBeepDone){spdBeepDone=true;beepSpeed();}
  else if(!overLim)spdBeepDone=false;
}

let gpsId=null;
function startGPS(){
  if(!navigator.geolocation||gpsId)return;
  navigator.geolocation.getCurrentPosition(()=>{
    gpsId=navigator.geolocation.watchPosition(pos=>{
      V.GPS=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0;
      V.Alt=pos.coords.altitude!=null?Math.round(pos.coords.altitude):'--';
      ud();ca();
    },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:true,maximumAge:1000});
  },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:false,timeout:5000});
}
document.addEventListener('touchstart',()=>startGPS(),{once:true});
document.addEventListener('click',()=>startGPS(),{once:true});
startGPS();

let bDev=null,bChr=null,bConn=false,userDisconnected=false,reconnecting=false;
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb',CHR='0000ffe1-0000-1000-8000-00805f9b34fb';

const CMD_ATSECU    = new Uint8Array([0x41,0x54,0x53,0x45,0x43,0x55,0x0d]);
const CMD_PING      = new Uint8Array([0xfc,0x05,0x12,0x00,0xee]);
const CMD_ZERO      = new Uint8Array([0x00,0x00,0x00]);
const CMD_FIRMWARE  = new Uint8Array([0xfc,0x05,0x36,0x00,0xca]);
const CMD_UNK50     = new Uint8Array([0xfc,0x05,0x50,0x00,0xb0]);
const CMD_SUBSCRIBE = new Uint8Array([
  0xfc,0x05,0x10,0x79,0x08,0x00,0x02,0x01,0x00,0x04,0x01,0x00,0x07,0x01,0x00,0x08,
  0x01,0x00,0x09,0x01,0x00,0x0a,0x01,0x00,0x0c,0x01,0x00,0x0d,0x01,0x00,0x0e,0x01,
  0x00,0x0f,0x01,0x00,0x10,0x01,0x00,0x14,0x01,0x00,0x16,0x02,0x00,0x18,0x01,0x00,
  0x19,0x01,0x00,0x1a,0x02,0x00,0x1c,0x01,0x00,0x1d,0x01,0x00,0x21,0x01,0x00,0x22,
  0x01,0x00,0x23,0x02,0x00,0x2c,0x01,0x00,0x2d,0x02,0x00,0x2e,0x02,0x00,0x33,0x02,
  0x00,0x37,0x02,0x00,0x3d,0x01,0x00,0x42,0x02,0x00,0x46,0x02,0x00,0x46,0x02,0x00,
  0x4d,0x01,0x00,0x4e,0x01,0x00,0x52,0x01,0x00,0x58,0x02,0x00,0x7c,0x02,0x00,0x82,
  0x01,0x00,0x87,0x01,0x00,0x89,0x01,0x00,0x8a,0x01,0x01,0xcd,0x02,0x10
]);
const CMD_STOP      = new Uint8Array([0xfc,0x05,0x13,0x00,0xed]);

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

const CHUNK = 20;
async function sendCmd(cmd){
  if(!bChr||!bConn)return;
  try{
    if(cmd.length <= CHUNK){
      await bChr.writeValueWithoutResponse(cmd);
    } else {
      for(let i=0;i<cmd.length;i+=CHUNK){
        const chunk = cmd.slice(i, i+CHUNK);
        await bChr.writeValueWithoutResponse(chunk);
        await sleep(3);
      }
    }
  }catch(e){}
}

async function initSession(){
  await sendCmd(CMD_ATSECU);   await sleep(103);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(14);
  await sendCmd(CMD_ZERO);      await sleep(115);
  await sendCmd(CMD_FIRMWARE);  await sleep(75);
  await sendCmd(CMD_UNK50);     await sleep(3800);
  await sendCmd(CMD_SUBSCRIBE); await sleep(500);
}

function parse20Byte(pkt){
  if(pkt.length !== 20) return false;
  if(pkt[0] === 0xfc) return false;
  const teng = pkt[6] - 28;
  const rpm  = (pkt[2]<<8)|pkt[3];
  const volt = pkt[5] / 10.0;
  const ap   = pkt[11];
  const tair = pkt[10] / 2.0;
  const tpsRaw = pkt[4];
  let matched = false;
  if(teng > -10 && teng < 150){ V.T_Eng = Math.round(teng); matched = true; }
  if(rpm  > 200 && rpm  < 15000){ V.RPM = rpm; matched = true; }
  if(volt > 9.5 && volt < 16){ V.Volt = volt.toFixed(1); matched = true; }
  if(ap >= 0 && ap <= 150){ V.MAP = ap; matched = true; }
  if(tair > -20 && tair < 80){ V.T_Air = Math.round(tair*10)/10; matched = true; }
  if(tpsRaw >= 0 && tpsRaw <= 255){
    _tpsRawLast = tpsRaw;
    if(TC.min !== null && TC.max !== null && TC.max !== TC.min){
      let pct = (tpsRaw - TC.min) / (TC.max - TC.min) * 100;
      V.TPS = Math.round(Math.max(0, Math.min(100, pct))*10)/10;
    } else { V.TPS = tpsRaw; }
    matched = true;
  }
  return matched;
}

function onData(e){
  _lastPacketTs=Date.now();
  const b=new Uint8Array(e.target.value.buffer);
  parse20Byte(b);
  ud();ca();
}

let _lastPacketTs=0;
const WATCHDOG_MS=4000;
let _watchdogInt=null;
function armWatchdog(){
  _lastPacketTs=Date.now();
  if(_watchdogInt) clearInterval(_watchdogInt);
  _watchdogInt=setInterval(()=>{
    if(userDisconnected || reconnecting) return;
    if(!bConn) {
      clearInterval(_watchdogInt);
      _watchdogInt = null;
      return;
    }
    if(Date.now()-_lastPacketTs>WATCHDOG_MS){
      try{ if(bDev&&bDev.gatt&&bDev.gatt.connected) bDev.gatt.disconnect(); }catch(e){}
    }
  },1000);
}

async function doConn(){
  const btn=document.getElementById('cb');
  if(bConn){
    userDisconnected=true;
    if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
    try{await sendCmd(CMD_STOP);}catch(e){}
    try{bDev&&bDev.gatt.disconnect();}catch(e){}
    bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='bLink3';
    document.getElementById('bs').className='pill';stopAlert();
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
    return;
  }
  userDisconnected=false;
  btn.textContent='⏳…';btn.className='pill go';
  try{
    bDev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
    bDev.addEventListener('gattserverdisconnected',onUnexpectedDisconnect);
    const srv=await bDev.gatt.connect();
    bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bChr.addEventListener('characteristicvaluechanged',onData);
    await bChr.startNotifications();
    bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
    document.getElementById('bs').textContent=bDev.name||'Connected';
    document.getElementById('bs').className='pill on';
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
    await initSession();
    armWatchdog();
  }catch(e){
    bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='Error';
    document.getElementById('bs').className='pill err';
  }
}

async function onUnexpectedDisconnect(){
  bConn=false;stopAlert();
  if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
  Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
  const btn=document.getElementById('cb'),bs=document.getElementById('bs');
  if(userDisconnected||reconnecting)return;
  reconnecting=true;
  bs.textContent='Перепідключення…';bs.className='pill err';
  btn.textContent='⏳…';btn.className='pill go';
  for(let attempt=1;attempt<=10&&!userDisconnected;attempt++){
    try{
      await sleep(1500);
      if(userDisconnected)break;
      const srv=await bDev.gatt.connect();
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      bs.textContent=bDev.name||'Connected';bs.className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      await initSession();
      armWatchdog();
      reconnecting=false;
      return;
    }catch(e){}
  }
  reconnecting=false;
}
document.getElementById('cb').addEventListener('click',doConn);

function mkTile(tile){
  const p=P[tile.k];
  const el=document.createElement('div');

    e.stopPropagation();
    lay=lay.filter(t=>t.id!==tile.id);ls('lay2',lay);render();
  });

  }

}

function mkF(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const u=document.createElement('div');u.className='tun';
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  const un=document.createElement('div');un.className='tu';un.textContent=p.u;

}

function mkG(tile,p){
  const w=document.createElement('div');w.className='gw';
  w.innerHTML=`<svg class="gsvg" viewBox="0 0 100 100">
    <path class="gbg" d="M 20 80 A 40 40 0 1 1 80 80"/>
    <path class="gfg" id="gfg_${tile.id}" d="M 20 80 A 40 40 0 1 1 80 80" stroke-dasharray="188.4" stroke-dashoffset="188.4"/>
  </svg>`;
  const gc=document.createElement('div');gc.className='gc';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  const un=document.createElement('div');un.className='tu';un.textContent=p.u;
  gc.append(l,v);if(p.u)gc.append(un);w.appendChild(gc);
  setTimeout(()=>ug(tile.id,tile.k),10);
  return w;
}

function ug(id,k){
  const path=document.getElementById('gfg_'+id);if(!path)return;
  const p=P[k],v=parseFloat(V[k]);
  if(isNaN(v)){path.style.strokeDashoffset=188.4;return;}
  const pct=Math.max(0,Math.min(1,(v-p.mn)/(p.mx-p.mn)));
  path.style.strokeDashoffset=188.4-(188.4*pct);
}

let prevV={};
function ud(){
  if(document.hidden)return;
  document.querySelectorAll('[data-lid]').forEach(el=>{
    const k=el.dataset.lid,v=V[k];
    if(prevV[k]===v)return;
    el.textContent=v;
  });
  lay.forEach(t=>{if(t.st==='gauge'&&t.sz==='s22')ug(t.id,t.k);});
  prevV={...V};
}

/* ── АДАПТИВНИЙ ВІДЕО-ПОТОК (ШВИДКІСТЬ + ТЕМПЕРАТУРА) ── */
const pipCanvas = document.getElementById('pip-canvas');
const pctx = pipCanvas.getContext('2d');
const pipVideo = document.getElementById('pip-video');
let pipDrawInterval=null;
let pipInitialized=false;

function drawPipFrame(){
  if(!pctx)return;
  
  const rect = pipVideo.getBoundingClientRect();
  const W = rect.width || 400; 
  const H = rect.height || 200;
  
  if(pipCanvas.width !== W || pipCanvas.height !== H) {
    pipCanvas.width = W;
    pipCanvas.height = H;
  }

  pctx.fillStyle='#0d0d0f';
  pctx.fillRect(0,0,W,H);

  let speed=String(V.GPS);
  if(speed==='--' || speed==='undefined') speed='0';
  let temp=String(V.T_Eng);
  if(temp==='undefined' || temp==='--') temp='0';

  pctx.textBaseline='middle';
  pctx.textAlign='center';

  const fontSize = Math.floor(H * 0.35);

  // Швидкість (Блакитний)
  pctx.fillStyle='#37e0e6';
  pctx.font=`700 ${fontSize}px monospace`;
  pctx.fillText(speed, W*0.25, H*0.45);

  pctx.fillStyle='#666';
  pctx.font='700 11px sans-serif';
  pctx.fillText('GPS КМ/ГОД', W*0.25, H*0.82);

  // Лінія розподілу по центру
  pctx.strokeStyle = 'rgba(255,255,255,0.07)';
  pctx.lineWidth = 2;
  pctx.beginPath();
  pctx.moveTo(W/2, 15); pctx.lineTo(W/2, H-15);
  pctx.stroke();

  // Температура (Помаранчевий)
  pctx.fillStyle='#ffb74d';
  pctx.font=`700 ${fontSize}px monospace`;
  pctx.fillText(temp, W*0.75, H*0.45);

  pctx.fillStyle='#666';
  pctx.font='700 11px sans-serif';
  pctx.fillText('ТЕМП °C', W*0.75, H*0.82);
}

function initPipStream(){
  if(pipInitialized)return;
  
  // Перевіряємо підтримку API перед запуском потоку
  const isPipSupported = ('requestPictureInPicture' in document.createElement('video')) || (pipVideo.webkitSetPresentationMode);
  if (!isPipSupported) {
    document.getElementById('pipBtnTop').style.color = '#ff4d4d';
    return;
  }

  pipInitialized=true;
  drawPipFrame();
  const stream = pipCanvas.captureStream(30);
  pipVideo.srcObject = stream;
  
  pipVideo.muted = true;
  pipVideo.play().catch(()=>{});
  
  if(pipDrawInterval) clearInterval(pipDrawInterval);
  pipDrawInterval = setInterval(drawPipFrame, 1000); // Оновлення раз на секунду для економії батареї
}

/* ── КЛЮЧОВИЙ ОБХІД БЛОКУВАННЯ (З КЛИКУ КОРИСТУВАЧА) ── */
async function togglePipMode(){
  // Примусовий старт/ініціалізація в момент кліку
  initPipStream();
  drawPipFrame();

  try {
    pipVideo.muted = true;
    await pipVideo.play(); // Робимо відео активним перед викликом режиму

    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      sht('PiP закрито');
    } else if (pipVideo.webkitSetPresentationMode) {
      // Обхід блокування Safari (iOS)
      pipVideo.webkitSetPresentationMode("picture-in-picture");
      sht('PiP активовано (iOS)');
    } else if (document.pictureInPictureEnabled || 'requestPictureInPicture' in pipVideo) {
      // Обхід Android / Desktop Chrome
      await pipVideo.requestPictureInPicture();
      sht('PiP активовано');
    } else {
      alert('Ваш пристрій не підтримує PiP');
    }
  } catch(e) {
    sht('Помилка: ' + e.message);
    console.error(e);
  }
}

/* ── ФУНКЦІОНАЛ НАЛАШТУВАННЯ ПЛИТОК ТА МОДАЛОК ── */
let curTab=0;

        <input type="number" id="ai_tw" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.T_warn}" placeholder="Warn">
        <input type="number" id="ai_cr" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.T_crit}" placeholder="Crit">
      </div>
      <div class="gt">Вольтаж батареї (V)</div>
      <div style="display:flex;gap:5px;padding:3px 5px;">
        <input type="number" step="0.1" id="ai_vw" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.Volt_warn}" placeholder="Warn">
        <input type="number" step="0.1" id="ai_vc" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.Volt_crit}" placeholder="Crit">
      </div>
      <div class="gt">Ліміт швидкості GPS</div>
      <div style="display:flex;align-items:center;gap:10px;padding:5px;">
        <input type="number" id="ai_sl" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);flex:1;" value="${AL.Spd_limit}">

    `;

function svAl(){
  AL.T_cold=parseInt(document.getElementById('ai_tc').value)||64;
  AL.T_warn=parseInt(document.getElementById('ai_tw').value)||90;

function startTpsCal(){
  document.getElementById('em').classList.remove('sh');
  const modal=document.getElementById('pm');
  document.getElementById('pt').textContent='Калібрування TPS';
  const pb=document.getElementById('pb');
  pb.innerHTML=`
    <div style="text-align:center;padding:10px;font-size:14px;">
      <p>Відпустіть ручку газу повністю.</p>
      <div style="font-size:24px;font-family:monospace;margin:10px 0;" id="tps_raw_val">Raw: --</div>
      <button class="ab pr" id="btn_tps_min">Зафіксувати Нуль (0%)</button>
      <p style="margin-top:20px;">Затисніть газ на повну (100%).</p>
      <button class="ab dn" id="btn_tps_max" disabled>Зафіксувати Максимум (100%)</button>
    </div>
  `;
  modal.classList.add('sh');
  
  if(_tpsLiveTimer) clearInterval(_tpsLiveTimer);
  _tpsLiveTimer=setInterval(()=>{
    document.getElementById('tps_raw_val').textContent='Raw: '+(_tpsRawLast!==null?_tpsRawLast:'--');
  },300);

  document.getElementById('btn_tps_min').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMin=_tpsRawLast;
    sht('Нуль зафіксовано: '+tmpMin);
    document.getElementById('btn_tps_max').disabled=false;
  };
  let tmpMin=null,tmpMax=null;
  document.getElementById('btn_tps_max').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMax=_tpsRawLast;
    if(tmpMax<=tmpMin){alert('Помилка: Максимум має бути більшим за Нуль');return;}
    TC={min:tmpMin,max:tmpMax};
    ls('tpscal',TC);
    sht('Калібрування завершено успішно!');
    if(_tpsLiveTimer) { clearInterval(_tpsLiveTimer); _tpsLiveTimer = null; }

  };
}

function cpk(){
  const m=document.getElementById('pm');
  const pb=document.getElementById('pb');
  pb.innerHTML='';
  
  if(editMode && ptile){
    document.getElementById('pt').textContent='Налаштувати плитку';
    const g=document.createElement('div');g.className='gt';g.textContent='Параметр';pb.appendChild(g);
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi'+(ptile.k===k?' sel':'');
      item.innerHTML=`<div class="pn2">${P[k].n}<span class="pc">${P[k].u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{selp(k);});pl.appendChild(item);
    });
    pb.appendChild(pl);
    
    const stg=document.createElement('div');stg.className='gt';stg.textContent='Стиль';pb.appendChild(stg);
    const sr=document.createElement('div');sr.className='sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.st||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });pb.appendChild(sr);
    
    const szg=document.createElement('div');szg.className='gt';szg.textContent='Розмір';pb.appendChild(szg);
    const szr=document.createElement('div');szr.className='szr';
    [['s1','1×1'],['s21','2×1'],['s22','2×2']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.sz||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });pb.appendChild(szr);
    
    const db=document.createElement('button');db.className='ab dn';db.textContent='🗑 Видалити';
    db.addEventListener('click',()=>{lay=lay.filter(t=>t.id!==ptile.id);ls('lay2',lay);m.classList.remove('sh');render();});
    pb.appendChild(db);
    m.classList.add('sh');
  } else if(editMode && !ptile){
    document.getElementById('pt').textContent='Додати нову плитку';
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi';
      item.innerHTML=`<div class="pn2">${P[k].n}</div>`;
      item.addEventListener('click',()=>{
        nid++;const nt={id:'t'+nid,k:k,st:'flat',sz:'s1'};
        lay.push(nt);ls('lay2',lay);m.classList.remove('sh');render();
      });pl.appendChild(item);
    });
    pb.appendChild(pl);m.classList.add('sh');
  }
}

function selp(k){if(ptile){ptile.k=k;ls('lay2',lay);render();cpk();}}
function selst(st){if(ptile){ptile.st=st;ls('lay2',lay);render();cpk();}}
function selsz(sz){if(ptile){ptile.sz=sz;ls('lay2',lay);render();cpk();}}

let htt=null;

  clearTimeout(htt);htt=setTimeout(()=>el.className='ht',2000);
}
