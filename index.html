<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Speedometer (Hidden Area)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: #ffffff;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        button:disabled {
            background-color: #3a3a3c;
            color: #aeaeae;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #ecc94b;
        }
        
        /* Канвас ховаємо */
        canvas { display: none; }

        /* ХИТРИЙ ТРЮК: Відео має нормальний розмір, але ми викидаємо його за екран */
        #video-container {
            position: absolute;
            left: -9999px; /* Відлітає далеко ліворуч, на екрані ПУСТО */
            top: 0;
            width: 300px;
            height: 200px;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>

    <h1>GPS у Picture-in-Picture</h1>
    <div id="status">Очікування GPS...</div>
    
    <button id="pipBtn" disabled>Запустити PiP</button>

    <div id="video-container">
        <video id="video" playsinline muted></video>
    </div>

    <canvas id="canvas" width="300" height="200"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pipBtn = document.getElementById('pipBtn');
        const statusDiv = document.getElementById('status');

        let currentSpeed = 0;
        let streamInitialized = false;

        // Енергоефективне малювання (1 кадр/сек)
        function drawSpeedFrame() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#34c759'; 
            ctx.font = 'bold 70px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentSpeed, canvas.width / 2, canvas.height / 2 - 10);

            ctx.fillStyle = '#aeaeae';
            ctx.font = '20px -apple-system, sans-serif';
            ctx.fillText('км/год', canvas.width / 2, canvas.height / 2 + 50);
        }

        function initStream() {
            drawSpeedFrame();
            
            // Захоплюємо потік (1 кадр/сек)
            const stream = canvas.captureStream(1); 
            video.srcObject = stream;
            
            streamInitialized = true;
            pipBtn.removeAttribute('disabled');
            statusDiv.innerText = "GPS готовий! Натисніть кнопку.";
            
            setInterval(drawSpeedFrame, 1000);
        }

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    if (position.coords.speed !== null && position.coords.speed !== undefined) {
                        currentSpeed = Math.round(position.coords.speed * 3.6);
                    } else {
                        currentSpeed = 0; 
                    }
                    
                    if (!streamInitialized) {
                        initStream();
                    } else {
                        drawSpeedFrame();
                    }
                },
                (error) => { statusDiv.innerText = `Помилка GPS: ${error.message}`; },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        }

        // Клікаємо по кнопці
        pipBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Запуск потоку...";
            try {
                // Спочатку ОБОВ'ЯЗКОВО примусово запускаємо програвання
                await video.play();

                // Викликаємо PiP
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode("picture-in-picture");
                    statusDiv.innerText = "Вікно PiP відкрито!";
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                    statusDiv.innerText = "Вікно PiP відкрито!";
                } else {
                    statusDiv.innerText = "Браузер блокує автоматичний PiP.";
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Помилка запуску. Переконайтеся, що відео грає.";
            }
        });
    </script>
</body>
</html>
