<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>SpeedTek Dash</title>
<style>
  :root{
    --bg:#0a0a0c;
    --carbon-a: rgba(255,255,255,0.015);
    --carbon-b: rgba(255,255,255,0.0);
    --panel:#111114;
    --line: rgba(255,255,255,0.08);
    --text:#f2f2f0;
    --muted:#8a8a92;
    --accent-cyan:#37e0e6;
    --accent-amber:#ffb74d;
    --accent-red:#ff4d4d;
    --accent-green:#4ade80;
    --accent-blue:#3b82f6;
    --accent-yellow:#ffd23f;
    --font-display: 'Rajdhani', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }

  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--bg);
    color:var(--text);
    font-family: var(--font-display);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  body{
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px);
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0;
    height:env(safe-area-inset-top, 0px);
    display:flex; align-items:center; gap:8px;
    padding: max(8px, env(safe-area-inset-top)) 10px 6px 10px;
    z-index:50;
  }
  .topbar{ height:auto; }
  .pill{
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 12px;
    font-size:13px;
    letter-spacing:0.5px;
    color:var(--muted);
    background:rgba(255,255,255,0.02);
  }
  .pill.on{ color:#9be8ff; border-color:#2b6f7a; background:rgba(43,170,190,0.08); }

  .editbtn{
    margin-left:auto;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 14px;
    font-size:13px;
    color:var(--muted);
    background:rgba(255,255,255,0.02);
    letter-spacing:0.5px;
    cursor: pointer;
  }
  .editbtn.active{
    color:#0a0a0c;
    background:var(--accent-cyan);
    border-color:var(--accent-cyan);
    font-weight:600;
  }

  /* ---------- GRID ---------- */
  #grid{
    position:fixed; inset:0;
    padding-top: calc(env(safe-area-inset-top) + 48px);
    padding-bottom: 8px;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }
  #gridInner{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: minmax(90px, 1fr);
    gap: 8px;
    padding: 0 8px 8px 8px;
    min-height: calc(100vh - env(safe-area-inset-top) - 56px);
  }

  /* Tile sizing spans */
  .tile{
    position:relative;
    border-radius:14px;
    background: var(--panel);
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px;
    min-height:90px;
    overflow:hidden;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .tile.size-1x1{ grid-column:span 1; grid-row:span 1; }
  .tile.size-2x2{ grid-column:span 2; grid-row:span 2; }
  .tile.size-2x1{ grid-column:span 2; grid-row:span 1; }

  .tile.dragging{
    opacity:0.35;
    transform:scale(0.96);
    z-index:30;
  }
  .tile.drag-over{
    box-shadow: inset 0 0 0 2px var(--accent-cyan);
  }
  .tile.editing{
    animation: jiggle 0.35s ease-in-out infinite;
    cursor: grab;
  }
  @keyframes jiggle{
    0%,100%{ transform: rotate(0deg); }
    25%{ transform: rotate(-0.6deg); }
    75%{ transform: rotate(0.6deg); }
  }

  .tile .remove-badge{
    position:absolute; top:6px; right:6px;
    width:22px; height:22px; border-radius:50%;
    background:#ff4d4d; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700;
    z-index:5; line-height:1;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
    display:none;
    cursor: pointer;
  }
  .tile.editing .remove-badge{ display:flex; }

  .tile.add-tile{
    border-style:dashed;
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.015);
    color: var(--muted);
    font-size:32px;
    cursor:pointer;
  }

  /* ---------- TILE TYPES ---------- */
  .tile-label{
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color: var(--param-color, var(--muted));
    margin-bottom:2px;
    text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%;
    font-weight:600;
  }
  .tile-value{
    font-family: var(--font-mono);
    font-weight:700;
    line-height:1;
    color:#fff;
    font-size: clamp(20px, 7vw, 34px);
    letter-spacing:1px;
  }
  .tile-unit{
    font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:1px;
  }
  .tile-underline{
    width:60%; height:1px; background: var(--param-color, var(--accent-cyan));
    opacity:0.5; margin:4px 0;
  }

  /* simple flat tile */
  .flat .tile-value{ font-size: clamp(22px, 8vw, 38px); }
  .flat.size-2x2 .tile-value{ font-size: clamp(34px, 9vw, 56px); }

  /* gauge ring tile */
  .gauge-wrap{
    position:relative;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .gauge-svg{ position:absolute; inset:0; width:100%; height:100%; }
  .gauge-center{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:2;
  }
  .gauge-center .tile-value{ font-size: clamp(20px, 6.5vw, 32px); }
  .size-2x2 .gauge-center .tile-value{ font-size: clamp(36px, 10vw, 64px); }

  .gauge-bg{ fill:none; stroke:rgba(255,255,255,0.06); stroke-width:6; }
  .gauge-fg{ fill:none; stroke: var(--param-color, var(--accent-cyan)); stroke-width:6; stroke-linecap:round; transition: stroke-dashoffset 0.4s ease; }

  /* ---------- MODAL: parameter picker ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .modal-backdrop.show{ opacity:1; pointer-events:auto; }

  .modal-sheet{
    width:100%; max-width:600px;
    background:#15151a;
    border:1px solid var(--line);
    border-radius:18px 18px 0 0;
    max-height:80vh;
    display:flex; flex-direction:column;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.2,.9,.3,1);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal-backdrop.show .modal-sheet{ transform: translateY(0); }

  .modal-header{
    padding:16px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  .modal-header h3{ margin:0; font-size:16px; letter-spacing:1px; font-weight:600; }
  .modal-close{
    border:none; background:rgba(255,255,255,0.06); color:var(--text);
    width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer;
  }

  .modal-body{ overflow-y:auto; padding:10px 12px; }

  .group-title{
    font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
    padding:10px 8px 6px;
  }

  .param-list{ display:flex; flex-direction:column; gap:4px; }
  .param-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 12px; border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid transparent;
    font-size:14px;
    cursor: pointer;
  }
  .param-item.selected{
    border-color: var(--accent-cyan);
    background: rgba(55,224,230,0.08);
  }
  .param-item .pname{ font-weight:600; }
  .param-item .pcode{ color:var(--muted); font-size:11px; font-family:var(--font-mono); margin-left:8px;}
  .param-item .check{
    width:20px; height:20px; border-radius:50%; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent;
  }
  .param-item.selected .check{ border-color:var(--accent-cyan); background:var(--accent-cyan); color:#0a0a0c; }

  .style-row{ display:flex; gap:8px; padding:10px 8px 16px; flex-wrap:wrap; }
  .style-btn{
    flex:1; min-width:80px;
    border:1px solid var(--line); border-radius:10px;
    padding:10px 6px; text-align:center; font-size:12px;
    background:rgba(255,255,255,0.03); color:var(--muted);
    cursor: pointer;
  }
  .style-btn.selected{ border-color:var(--accent-cyan); color:#fff; background:rgba(55,224,230,0.08); }

  .size-row{ display:flex; gap:8px; padding:0 8px 14px; }

  .delete-row{ padding: 4px 8px 16px; }
  .delete-btn{
    width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,77,77,0.3);
    background:rgba(255,77,77,0.08); color:#ff8080; font-size:14px; font-weight:600;
    cursor: pointer;
  }

  /* scrollbar minimal */
  ::-webkit-scrollbar{ width:4px; height:4px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15); border-radius:2px; }

  .hint-toast{
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(20,20,24,0.95); border:1px solid var(--line);
    padding:8px 16px; border-radius:20px; font-size:12px; color:var(--muted);
    z-index:60; opacity:0; transition:opacity .3s ease; pointer-events:none;
    white-space:nowrap;
  }
  .hint-toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="pill on">bLink</div>
  <div class="pill on">GPS</div>
  <div class="pill">REC</div>
  <button class="pill" id="pipBtn" style="margin-left:auto; cursor:pointer;">PiP</button>
  <button class="editbtn" id="editBtn">Налаштувати</button>
</div>

<div id="grid">
  <div id="gridInner"></div>
</div>

<div class="hint-toast" id="hintToast">Затримай — перемістити • Тап — змінити параметр</div>

<canvas id="pipCanvas" width="800" height="400" style="display:none;"></canvas>
<video id="pipVideo" style="position:fixed; width:1px; height:1px; opacity:0; pointer-events:none;" muted playsinline></video>

<div class="modal-backdrop" id="pipModalBackdrop">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Picture-in-Picture</h3>
      <button class="modal-close" id="pipModalClose">✕</button>
    </div>
    <div class="modal-body" id="pipModalBody"></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3 id="modalTitle">Вибрати параметр</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      </div>
  </div>
</div>

<script>
/* ================= PARAMETER LIBRARY ================= */
const PARAM_GROUPS = [
  { title: "Двигун", items: [
    { code:"RPM", name:"RPM", unit:"об/хв", min:0, max:8000, color:"#ffd23f" },
    { code:"T_Eng", name:"T_Eng (темп. двигуна)", unit:"°C", min:0, max:130, color:"#3b82f6" },
    { code:"T_Air", name:"T_Air (темп. повітря)", unit:"°C", min:-20, max:80, color:"#37e0e6" },
    { code:"SA", name:"SA (кут випередження)", unit:"°", min:-10, max:40, color:"#ff9f43" },
    { code:"Load", name:"Engine Load", unit:"%", min:0, max:100, color:"#4ade80" },
    { code:"Gear", name:"Gear (передача)", unit:"", min:0, max:8, color:"#3b82f6" },
    { code:"MAP", name:"MAP (тиск у колекторі)", unit:"кПа", min:0, max:255, color:"#37e0e6" },
    { code:"MAF", name:"MAF (витрата повітря)", unit:"г/с", min:0, max:400, color:"#37e0e6" },
  ]},
  { title: "Паливо / Лямбда", items: [
    { code:"AFR", name:"AFR", unit:"", min:8, max:20, color:"#ffb74d" },
    { code:"O2_S1", name:"O2_S1 (лямбда)", unit:"λ", min:0.5, max:1.5, color:"#ffd23f" },
    { code:"Fuel_CL", name:"Fuel Trim CL", unit:"%", min:-25, max:25, color:"#4ade80" },
    { code:"Fuel_Level", name:"Рівень палива", unit:"%", min:0, max:100, color:"#4ade80" },
    { code:"Cyl1_Inj", name:"Cyl1 Injector PW", unit:"мс", min:0, max:20, color:"#37e0e6" },
    { code:"Cyl1_Eng_AP", name:"Cyl1 Eng AP", unit:"", min:0, max:100, color:"#37e0e6" },
  ]},
  { title: "Дросель / Турбо", items: [
    { code:"TPS", name:"TPS (дросель)", unit:"%", min:0, max:100, color:"#37e0e6" },
    { code:"Boost", name:"Boost Pressure", unit:"бар", min:-1, max:3, color:"#ff4d4d" },
    { code:"EGT", name:"EGT (вихлоп)", unit:"°C", min:0, max:1000, color:"#ff4d4d" },
  ]},
  { title: "Електрика / GPS", items: [
    { code:"Volt_Batt", name:"Volt_Batt", unit:"V", min:9, max:16, color:"#4ade80" },
    { code:"GPS_Speed", name:"GPS Speed", unit:"км/г", min:0, max:300, color:"#37e0e6" },
    { code:"GPS_Alt", name:"GPS Altitude", unit:"м", min:0, max:2000, color:"#8a8a92" },
  ]},
];

const ALL_PARAMS = {};
PARAM_GROUPS.forEach(g => g.items.forEach(p => ALL_PARAMS[p.code] = p));

/* mock live values */
function mockValue(p){
  const t = Date.now()/1000;
  switch(p.code){
    case "RPM": return Math.round(1700 + Math.sin(t*0.7)*600 + Math.random()*40);
    case "T_Eng": return Math.round(65 + Math.sin(t*0.05)*3);
    case "T_Air": return Math.round(36 + Math.sin(t*0.1)*2);
    case "SA": return Math.round(8 + Math.sin(t*0.6)*4);
    case "Load": return Math.round(40 + Math.sin(t*0.4)*30);
    case "Gear": return Math.max(1, Math.round(3 + Math.sin(t*0.2)*2));
    case "MAP": return Math.round(95 + Math.sin(t*0.5)*30);
    case "MAF": return Math.round(60 + Math.sin(t*0.5)*40);
    case "AFR": return (13.3 + Math.sin(t*0.8)*1.2).toFixed(1);
    case "O2_S1": return (0.98 + Math.sin(t*0.9)*0.15).toFixed(2);
    case "Fuel_CL": return (Math.sin(t*0.3)*5).toFixed(2);
    case "Fuel_Level": return Math.round(78 - (t%600)/600*5);
    case "Cyl1_Inj": return (4.69 + Math.sin(t*0.7)*1.2).toFixed(2);
    case "Cyl1_Eng_AP": return (50.3 + Math.sin(t*0.4)*5).toFixed(1);
    case "TPS": return Math.max(0,(Math.sin(t*0.6)*40+10)).toFixed(1);
    case "Boost": return (Math.sin(t*0.7)*0.8).toFixed(2);
    case "EGT": return Math.round(580 + Math.sin(t*0.3)*100);
    case "Volt_Batt": return (13.9 + Math.sin(t*0.2)*0.6).toFixed(1);
    case "GPS_Speed": return Math.round(149 + Math.sin(t*0.3)*30);
    case "GPS_Alt": return Math.round(120 + Math.sin(t*0.1)*10);
    default: return "--";
  }
}

/* ================= STORAGE UTILS ================= */
function localStorageGet(k){ 
  try { return localStorage.getItem(k); } catch(e) { return null; } 
}
function localStorageSet(k,v){ 
  try { localStorage.setItem(k, v); } catch(e) { } 
}

/* ================= LAYOUT STATE ================= */
let layout = loadLayout() || defaultLayout();
let editMode = false;

function defaultLayout(){
  return [
    {id:"t1", param:"AFR", style:"flat", size:"1x1"},
    {id:"t2", param:"Fuel_CL", style:"flat", size:"1x1"},
    {id:"t3", param:"T_Air", style:"flat", size:"1x1"},
    {id:"t4", param:"SA", style:"flat", size:"1x1"},
    {id:"t5", param:"T_Eng", style:"gauge", size:"2x2"},
    {id:"t6", param:"RPM", style:"gauge", size:"2x2"},
    {id:"t7", param:"Gear", style:"gauge", size:"1x1"},
    {id:"t8", param:"EGT", style:"gauge", size:"1x1"},
    {id:"t9", param:"O2_S1", style:"gauge", size:"1x1"},
    {id:"t10", param:"TPS", style:"gauge", size:"1x1"},
    {id:"t11", param:"RPM", style:"flat", size:"1x1"},
    {id:"t12", param:"Volt_Batt", style:"flat", size:"1x1"},
    {id:"t13", param:"GPS_Speed", style:"flat", size:"2x1"},
  ];
}

function loadLayout(){
  const raw = localStorageGet('aracer_layout');
  return raw ? JSON.parse(raw) : null;
}
function saveLayout(){
  localStorageSet('aracer_layout', JSON.stringify(layout));
}

/* ================= RENDER ================= */
const gridInner = document.getElementById('gridInner');

function render(){
  gridInner.innerHTML = "";
  layout.forEach(tile => {
    gridInner.appendChild(renderTile(tile));
  });
  if(editMode){
    const addTile = document.createElement('div');
    addTile.className = 'tile add-tile size-1x1';
    addTile.textContent = '+';
    addTile.addEventListener('click', ()=> openPicker(null));
    gridInner.appendChild(addTile);
  }
}

function renderTile(tile){
  const p = ALL_PARAMS[tile.param] || PARAM_GROUPS[0].items[0];
  const el = document.createElement('div');
  el.className = `tile size-${tile.size} ${tile.style} ${editMode?'editing':''}`;
  el.dataset.id = tile.id;
  el.style.setProperty('--param-color', p.color);

  const removeBadge = document.createElement('div');
  removeBadge.className = 'remove-badge';
  removeBadge.textContent = '✕';
  removeBadge.addEventListener('click', (e)=>{
    e.stopPropagation();
    layout = layout.filter(t=>t.id!==tile.id);
    saveLayout(); render();
  });
  el.appendChild(removeBadge);

  if(tile.style === 'gauge'){
    el.appendChild(buildGauge(tile, p));
  } else {
    el.appendChild(buildFlat(tile, p));
  }

  attachTileInteractions(el, tile);
  return el;
}

function buildFlat(tile, p){
  const wrap = document.createElement('div');
  wrap.style.display='flex'; wrap.style.flexDirection='column'; wrap.style.alignItems='center';
  const label = document.createElement('div');
  label.className='tile-label'; label.textContent = p.name.split(' ')[0];
  const underline = document.createElement('div');
  underline.className='tile-underline';
  const val = document.createElement('div');
  val.className='tile-value';
  val.textContent = mockValue(p);
  val.dataset.code = p.code;
  const unit = document.createElement('div');
  unit.className='tile-unit'; unit.textContent = p.unit;

  wrap.appendChild(label);
  wrap.appendChild(underline);
  wrap.appendChild(val);
  if(p.unit) wrap.appendChild(unit);
  return wrap;
}

function buildGauge(tile, p){
  const wrap = document.createElement('div');
  wrap.className='gauge-wrap';

  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 100 100");
  svg.classList.add('gauge-svg');

  const r = 42;
  const circumference = 2*Math.PI*r;

  const bg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  bg.setAttribute("cx","50"); bg.setAttribute("cy","50"); bg.setAttribute("r",r.toString());
  bg.classList.add('gauge-bg');
  bg.setAttribute("stroke-dasharray", `${circumference*0.75} ${circumference}`);
  bg.setAttribute("stroke-dashoffset", (circumference*0.125).toString());
  bg.setAttribute("transform","rotate(90 50 50)");

  const fg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  fg.setAttribute("cx","50"); fg.setAttribute("cy","50"); fg.setAttribute("r",r.toString());
  fg.classList.add('gauge-fg');
  fg.setAttribute("transform","rotate(90 50 50)");
  fg.dataset.code = p.code;
  fg.dataset.r = r.toString();
  fg.dataset.circumference = circumference.toString();

  svg.appendChild(bg);
  svg.appendChild(fg);

  const center = document.createElement('div');
  center.className='gauge-center';
  const label = document.createElement('div');
  label.className='tile-label'; label.textContent = p.name.split(' ')[0];
  const val = document.createElement('div');
  val.className='tile-value'; val.dataset.code = p.code;
  val.textContent = mockValue(p);
  const unit = document.createElement('div');
  unit.className='tile-unit'; unit.textContent = p.unit;

  center.appendChild(label);
  center.appendChild(val);
  if(p.unit) center.appendChild(unit);

  wrap.appendChild(svg);
  wrap.appendChild(center);

  updateGaugeArc(fg, p, mockValue(p));
  return wrap;
}

function updateGaugeArc(fg, p, value){
  const circumference = parseFloat(fg.dataset.circumference);
  const arcLen = circumference * 0.75;
  let pct = (value - p.min) / (p.max - p.min);
  pct = Math.max(0, Math.min(1, pct));
  const dash = arcLen * pct;
  fg.setAttribute("stroke-dasharray", `${dash} ${circumference}`);
  fg.setAttribute("stroke-dashoffset", (circumference*0.125).toString());
}

/* ================= LIVE UPDATE ================= */
setInterval(()=>{
  document.querySelectorAll('[data-code]').forEach(el=>{
    const p = ALL_PARAMS[el.dataset.code];
    if(!p) return;
    const v = mockValue(p);
    if(el.classList.contains('tile-value')){
      el.textContent = v;
    } else if(el.tagName === 'circle' || el.tagName === 'CIRCLE'){
      updateGaugeArc(el, p, v);
    }
  });
}, 500);

/* ================= INTERACTIONS ================= */
let longPressTimer = null;
let dragState = null;

function attachTileInteractions(el, tile){
  let tapStart = 0;
  let moved = false;

  el.addEventListener('pointerdown', (e)=>{
    if(e.target.closest('.remove-badge')) return;
    tapStart = Date.now();
    moved = false;

    longPressTimer = setTimeout(()=>{
      if(!editMode) enterEditMode();
      startDrag(el, tile, e);
    }, 450);
  });

  el.addEventListener('pointermove', ()=>{ moved = true; clearTimeout(longPressTimer); });
  el.addEventListener('pointerup', (e)=>{
    clearTimeout(longPressTimer);
    if(dragState && dragState.tileId === tile.id){
      endDrag(e);
      return;
    }
    const dt = Date.now() - tapStart;
    if(!moved && dt < 450){
      openPicker(tile);
    }
  });
  el.addEventListener('pointerleave', ()=>{ clearTimeout(longPressTimer); });
}

function enterEditMode(){
  editMode = true;
  document.getElementById('editBtn').classList.add('active');
  document.getElementById('editBtn').textContent = 'Готово';
  showHint('Затримай — перемістити • Тап — змінити параметр');
  render();
}
function exitEditMode(){
  editMode = false;
  document.getElementById('editBtn').classList.remove('active');
  document.getElementById('editBtn').textContent = 'Налаштувати';
  render();
}

document.getElementById('editBtn').addEventListener('click', ()=>{
  if(editMode) exitEditMode(); else enterEditMode();
});

function showHint(msg){
  const t = document.getElementById('hintToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function startDrag(el, tile, e){
  dragState = { tileId: tile.id, el };
  el.classList.add('dragging');
  if(navigator.vibrate) navigator.vibrate(15);
  document.addEventListener('pointermove', onDragMove);
}

function onDragMove(e){
  if(!dragState) return;
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const targetTile = target && target.closest('.tile');
  document.querySelectorAll('.tile.drag-over').forEach(t=>t.classList.remove('drag-over'));
  if(targetTile && targetTile.dataset.id && targetTile.dataset.id !== dragState.tileId){
    targetTile.classList.add('drag-over');
    dragState.overId = targetTile.dataset.id;
  } else {
    dragState.overId = null;
  }
}

function endDrag(e){
  document.removeEventListener('pointermove', onDragMove);
  if(!dragState) return;
  const overId = dragState.overId;
  const fromId = dragState.tileId;

  if(overId && overId !== fromId){
    const fromIdx = layout.findIndex(t=>t.id===fromId);
    const toIdx = layout.findIndex(t=>t.id===overId);
    if(fromIdx !== -1 && toIdx !== -1){
      const [moved] = layout.splice(fromIdx, 1);
      layout.splice(toIdx, 0, moved);
      saveLayout();
    }
  }
  dragState = null;
  document.querySelectorAll('.drag-over').forEach(t=>t.classList.remove('drag-over'));
  render();
}

/* ================= PARAMETER PICKER MODAL ================= */
const backdrop = document.getElementById('modalBackdrop');
const modalBody = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');
let pickerTarget = null;

function openPicker(tile){
  pickerTarget = tile;
  modalTitle.textContent = tile ? 'Змінити параметр' : 'Додати плитку';
  buildPickerBody();
  backdrop.classList.add('show');
}
function closePicker(){
  backdrop.classList.remove('show');
  pickerTarget = null;
}
document.getElementById('modalClose').addEventListener('click', closePicker);
backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closePicker(); });

function buildPickerBody(){
  modalBody.innerHTML = '';

  // Безпечне отримання параметрів з fallback на випадок, якщо pickerTarget == null
  const currentParam = pickerTarget ? pickerTarget.param : null;
  const currentStyle = pickerTarget ? pickerTarget.style : 'flat';
  const currentSize = pickerTarget ? pickerTarget.size : '1x1';

  // Param list
  PARAM_GROUPS.forEach(group=>{
    const gt = document.createElement('div');
    gt.className='group-title'; gt.textContent = group.title;
    modalBody.appendChild(gt);

    const list = document.createElement('div');
    list.className='param-list';
    group.items.forEach(p=>{
      const item = document.createElement('div');
      item.className = 'param-item' + (p.code===currentParam?' selected':'');
      item.innerHTML = `<div><span class="pname">${p.name}</span><span class="pcode">${p.unit||''}</span></div><div class="check">✓</div>`;
      item.addEventListener('click', ()=> selectParam(p.code));
      list.appendChild(item);
    });
    modalBody.appendChild(list);
  });

  // Style choice
  const styleTitle = document.createElement('div');
  styleTitle.className='group-title'; styleTitle.textContent='Стиль відображення';
  modalBody.appendChild(styleTitle);

  const styleRow = document.createElement('div');
  styleRow.className='style-row';
  [['flat','Цифри'],['gauge','Шкала / Кільце']].forEach(([val,label])=>{
    const b = document.createElement('div');
    b.className='style-btn'+(currentStyle===val?' selected':'');
    b.textContent = label;
    b.addEventListener('click', ()=> selectStyle(val));
    styleRow.appendChild(b);
  });
  modalBody.appendChild(styleRow);

  // Size choice
  const sizeTitle = document.createElement('div');
  sizeTitle.className='group-title'; sizeTitle.textContent='Розмір плитки';
  modalBody.appendChild(sizeTitle);

  const sizeRow = document.createElement('div');
  sizeRow.className='size-row';
  [['1x1','Малий'],['2x1','Широкий'],['2x2','Великий']].forEach(([val,label])=>{
    const b = document.createElement('div');
    b.className='style-btn'+(currentSize===val?' selected':'');
    b.style.flex='1';
    b.textContent = label;
    b.addEventListener('click', ()=> selectSize(val));
    sizeRow.appendChild(b);
  });
  modalBody.appendChild(sizeRow);

  // Delete
  if(pickerTarget){
    const delRow = document.createElement('div');
    delRow.className='delete-row';
    const delBtn = document.createElement('button');
    delBtn.className='delete-btn';
    delBtn.textContent='Видалити плитку';
    delBtn.addEventListener('click', ()=>{
      layout = layout.filter(t=>t.id!==pickerTarget.id);
      saveLayout();
      closePicker();
      render();
    });
    delRow.appendChild(delBtn);
    modalBody.appendChild(delRow);
  }
}

function selectParam(code){
  if(pickerTarget){
    pickerTarget.param = code;
  } else {
    // Безпечна генерація унікальних ID на основі timestamp
    pickerTarget = {id:'t_' + Date.now(), param:code, style:'flat', size:'1x1'};
    layout.push(pickerTarget);
  }
  saveLayout();
  buildPickerBody();
  render();
}
function selectStyle(val){
  if(!pickerTarget) return;
  pickerTarget.style = val;
  saveLayout();
  buildPickerBody();
  render();
}
function selectSize(val){
  if(!pickerTarget) return;
  pickerTarget.size = val;
  saveLayout();
  buildPickerBody();
  render();
}

/* ================= PICTURE-IN-PICTURE ================= */
let pipConfig = loadPipConfig() || { big: 'RPM', small1: 'T_Eng', small2: 'Volt_Batt' };

function loadPipConfig(){
  const raw = localStorageGet('aracer_pip');
  return raw ? JSON.parse(raw) : null;
}
function savePipConfig(){ localStorageSet('aracer_pip', JSON.stringify(pipConfig)); }

const pipCanvas = document.getElementById('pipCanvas');
const pipVideo = document.getElementById('pipVideo');
const ctx = pipCanvas.getContext('2d');
let pipDrawInterval = null;

function drawPipFrame(){
  const W = pipCanvas.width, H = pipCanvas.height;
  ctx.clearRect(0,0,W,H);

  // background
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0,0,W,H);

  const big = ALL_PARAMS[pipConfig.big] || PARAM_GROUPS[0].items[0];
  const s1 = ALL_PARAMS[pipConfig.small1] || PARAM_GROUPS[0].items[1];
  const s2 = ALL_PARAMS[pipConfig.small2] || PARAM_GROUPS[3].items[0];

  const bigW = W * 0.62;
  ctx.textBaseline = 'middle';

  // Всі розміри шрифтів помножено на 2, оскільки роздільна здатність тепер 800x400 (ідеально чітко)
  ctx.fillStyle = big.color;
  ctx.font = '600 44px "Segoe UI", sans-serif'; 
  ctx.textAlign = 'left';
  ctx.fillText(big.name.split(' ')[0].toUpperCase(), 36, 60);

  const bigVal = mockValue(big);
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 170px monospace'; 
  ctx.fillText(String(bigVal), 32, H * 0.55);

  if(big.unit){
    ctx.fillStyle = '#8a8a92';
    ctx.font = '500 36px "Segoe UI", sans-serif';
    ctx.fillText(big.unit, 36, H * 0.55 + 85);
  }

  // divider line
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bigW, 28);
  ctx.lineTo(bigW, H-28);
  ctx.stroke();

  // small params
  [s1, s2].forEach((p, i)=>{
    const yBase = i===0 ? H * 0.30 : H * 0.74;
    ctx.fillStyle = p.color;
    ctx.font = '600 32px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(p.name.split(' ')[0].toUpperCase(), bigW + 32, yBase - 50);

    const val = mockValue(p);
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 76px monospace';
    ctx.fillText(String(val), bigW + 32, yBase + 10);

    if(p.unit){
      ctx.fillStyle = '#8a8a92';
      ctx.font = '500 28px "Segoe UI", sans-serif';
      ctx.fillText(p.unit, bigW + 32, yBase + 62);
    }
  });
}

async function startPip(){
  if(!('requestPictureInPicture' in document.createElement('video'))){
    showHint('PiP не підтримується у цьому браузері');
    return;
  }
  
  drawPipFrame();
  const stream = pipCanvas.captureStream(30);
  pipVideo.srcObject = stream;

  if(pipDrawInterval) clearInterval(pipDrawInterval);
  pipDrawInterval = setInterval(drawPipFrame, 500);

  try{
    await pipVideo.play();
    if(document.pictureInPictureElement){
      await document.exitPictureInPicture();
    } else {
      await pipVideo.requestPictureInPicture();
    }
  }catch(err){
    showHint('Не вдалось відкрити PiP: ' + err.message);
  }
}

pipVideo.addEventListener('leavepictureinpicture', ()=>{
  if(pipDrawInterval){ clearInterval(pipDrawInterval); pipDrawInterval = null; }
});

/* PiP settings modal */
const pipModalBackdrop = document.getElementById('pipModalBackdrop');
const pipModalBody = document.getElementById('pipModalBody');

document.getElementById('pipBtn').addEventListener('click', ()=>{
  buildPipModalBody();
  pipModalBackdrop.classList.add('show');
});
document.getElementById('pipModalClose').addEventListener('click', ()=>{
  pipModalBackdrop.classList.remove('show');
});
pipModalBackdrop.addEventListener('click', (e)=>{ if(e.target===pipModalBackdrop) pipModalBackdrop.classList.remove('show'); });

function buildPipModalBody(){
  pipModalBody.innerHTML = '';

  const slots = [
    { key:'big', title:'Велике число' },
    { key:'small1', title:'Малий параметр 1' },
    { key:'small2', title:'Малий параметр 2' },
  ];

  slots.forEach(slot=>{
    const gt = document.createElement('div');
    gt.className='group-title'; gt.textContent = slot.title;
    pipModalBody.appendChild(gt);

    const list = document.createElement('div');
    list.className='param-list';

    PARAM_GROUPS.forEach(group=>{
      group.items.forEach(p=>{
        const item = document.createElement('div');
        item.className = 'param-item' + (pipConfig[slot.key]===p.code?' selected':'');
        item.innerHTML = `<div><span class="pname">${p.name}</span><span class="pcode">${p.unit||''}</span></div><div class="check">✓</div>`;
        item.addEventListener('click', ()=>{
          pipConfig[slot.key] = p.code;
          savePipConfig();
          buildPipModalBody();
        });
        list.appendChild(item);
      });
    });
    pipModalBody.appendChild(list);
  });

  const startRow = document.createElement('div');
  startRow.className='delete-row';
  const startBtn = document.createElement('button');
  startBtn.className='delete-btn';
  startBtn.style.background='rgba(55,224,230,0.1)';
  startBtn.style.borderColor='rgba(55,224,230,0.3)';
  startBtn.style.color='#9be8ff';
  startBtn.textContent='Відкрити Picture-in-Picture';
  startBtn.addEventListener('click', ()=>{
    pipModalBackdrop.classList.remove('show');
    startPip();
  });
  startRow.appendChild(startBtn);
  pipModalBody.appendChild(startRow);
}

/* init */
render();
</script>
