<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash</title>
<style>
:root{
  --bg:#000; --panel:#0d0d0f; --line:rgba(255,255,255,0.07);
  --text:#f2f2f0; --muted:#666;
  --cyan:#37e0e6; --amber:#ffb74d; --red:#ff4d4d;
  --green:#4ade80; --blue:#3b82f6; --yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000;color:var(--text);
  font-family:'Rajdhani','Segoe UI',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) 8px 5px;
  background:rgba(0,0,0,0.95);border-bottom:1px solid var(--line);}
.pill{border:1px solid var(--line);border-radius:6px;padding:5px 9px;
  font-size:12px;color:var(--muted);background:transparent;white-space:nowrap;cursor:pointer;}
.pill.on{color:#9be8ff;border-color:#2b6f7a;}
.pill.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);}
.pill.err{color:#ff8080;border-color:rgba(255,77,77,0.3);}
.pill.go{color:var(--amber);border-color:rgba(255,183,77,0.3);}
#eb{margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
  padding:5px 11px;font-size:12px;color:var(--muted);background:transparent;cursor:pointer;}
#eb.a{color:#000;background:var(--cyan);border-color:var(--cyan);font-weight:700;}
@media(orientation:landscape){
  :root{--th:36px;}
  .pill{font-size:11px;padding:3px 7px;}
  #eb{font-size:11px;padding:3px 9px;}
}

/* GRID */
#grid{position:fixed;inset:0;
  padding-top:calc(env(safe-area-inset-top) + var(--th));
  padding-bottom:env(safe-area-inset-bottom,6px);overflow:hidden;}

/* Portrait: 4 cols, auto rows with min height */
#gi{display:grid;gap:5px;padding:5px;height:100%;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,1fr);}

/* Landscape: 6 cols, 2 rows */
@media(orientation:landscape){
  :root{--th:36px;}
  #gi{grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(2,1fr);}
  .pill{font-size:11px;padding:3px 7px;}
  #eb{font-size:11px;padding:3px 9px;}
}

/* TILES */
.tile{position:relative;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;overflow:hidden;-webkit-touch-callout:none;will-change:auto;}
.tile.s1{ grid-column:span 1;grid-row:span 1;}
.tile.s22{grid-column:span 2;grid-row:span 2;}
.tile.s21{grid-column:span 2;grid-row:span 1;}

/* Landscape: s1 tiles span 2 cols to fill gaps */
@media(orientation:landscape){
  .tile.s1{grid-column:span 2;grid-row:span 1;}
  .tile.s22{grid-column:span 2;grid-row:span 2;}
  .tile.s21{grid-column:span 2;grid-row:span 1;}
}
/* alert states — CSS only, no JS animation */
.tile.warn{border-color:rgba(255,211,63,0.5);background:rgba(255,211,63,0.06);}
.tile.alrt{border-color:rgba(255,77,77,0.6);background:rgba(255,77,77,0.1);}
/* edit */
.tile.ed{animation:jig .4s ease-in-out infinite;}
@keyframes jig{0%,100%{transform:rotate(0)}25%{transform:rotate(-.7deg)}75%{transform:rotate(.7deg)}}
.tile.ds{animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 16px rgba(55,224,230,0.25)!important;transform:scale(1.03);z-index:20;}
.tile.dov{box-shadow:inset 0 0 0 2px var(--amber);}
.rm{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:#ff4d4d;color:#fff;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  z-index:5;display:none;}
.tile.ed .rm{display:flex;}
.add{border-style:dashed;border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.01);color:var(--muted);font-size:26px;
  cursor:pointer;animation:none!important;}

/* TILE CONTENT */
.tl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pc,var(--muted));margin-bottom:1px;text-align:center;
  white-space:normal;word-break:break-word;line-height:1.2;font-weight:700;}
.tv{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
  line-height:1;color:#fff;letter-spacing:1px;
  font-size:clamp(20px,6vw,36px);}
.tu{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.tun{width:50%;height:1px;background:var(--pc,var(--cyan));opacity:0.45;margin:3px 0;}
.s22 .tv{font-size:clamp(32px,8vw,56px);}
.s21 .tv{font-size:clamp(22px,6vw,40px);}
@media(orientation:landscape){
  .tl{font-size:11px;}
  .tv{font-size:clamp(18px,4.5vw,32px);}
  .s22 .tv{font-size:clamp(26px,6vw,44px);}
  .s21 .tv{font-size:clamp(20px,5vw,36px);}
}

/* GAUGE */
.gw{position:relative;width:100%;height:100%;min-height:50px;
  display:flex;align-items:center;justify-content:center;}
.gsvg{position:absolute;inset:0;width:100%;height:100%;}
.gc{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.gbg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5;}
.gfg{fill:none;stroke:var(--pc,var(--cyan));stroke-width:5;stroke-linecap:round;}

/* MODALS */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.82);
  backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;}
.mb.sh{opacity:1;pointer-events:auto;}
.ms{width:100%;max-width:620px;background:#0c0c0f;border:1px solid var(--line);
  border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.9,.3,1);
  padding-bottom:env(safe-area-inset-bottom);}
.mb.sh .ms{transform:translateY(0);}
.mh{padding:12px 14px 9px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.mh h3{margin:0;font-size:14px;letter-spacing:1px;font-weight:600;}
.mc2{border:none;background:rgba(255,255,255,0.05);color:var(--text);
  width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;}
.mbody{overflow-y:auto;padding:6px 11px;flex:1;}
.gt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:7px 5px 3px;}
.pl{display:flex;flex-direction:column;gap:2px;}
.pi{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:9px;background:rgba(255,255,255,0.03);
  border:1px solid transparent;font-size:13px;cursor:pointer;}
.pi.sel{border-color:var(--cyan);background:rgba(55,224,230,0.07);}
.pi .pn{font-weight:600;}.pi .pc{color:var(--muted);font-size:10px;font-family:monospace;margin-left:5px;}
.pi .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.pi.sel .ck{border-color:var(--cyan);background:var(--cyan);color:#000;}
.sr,.szr{display:flex;gap:5px;padding:7px 5px;flex-wrap:wrap;}
.sb{flex:1;min-width:55px;border:1px solid var(--line);border-radius:9px;
  padding:8px 5px;text-align:center;font-size:11px;
  background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;}
.sb.sel{border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.07);}
.ab{width:100%;padding:10px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;}
.ab.pr{background:rgba(55,224,230,0.1);border:1px solid rgba(55,224,230,0.35);color:#9be8ff;}
.ab.dn{background:rgba(255,77,77,0.07);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
.tbar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:11px;font-weight:600;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.a{color:var(--cyan);border-bottom-color:var(--cyan);}

/* pip rows */
.pir{display:flex;align-items:center;gap:7px;padding:7px 5px;border-bottom:1px solid var(--line);}
.pcb{border:1px solid var(--line);border-radius:5px;padding:3px 9px;
  font-size:10px;color:var(--muted);background:transparent;cursor:pointer;white-space:nowrap;}
.pcb.lft{border-color:rgba(55,224,230,0.4);color:var(--cyan);}
.pcb.rgt{border-color:rgba(255,183,77,0.4);color:var(--amber);}
.prm{border:none;background:rgba(255,77,77,0.08);color:#ff8080;
  border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;flex-shrink:0;}

/* alert rows */
.alrow{display:flex;align-items:center;gap:9px;padding:9px 5px;border-bottom:1px solid var(--line);}
.allab{flex:1;font-size:12px;}.allab span{display:block;font-size:9px;color:var(--muted);margin-top:1px;}
.alinp{background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:7px;
  padding:5px 8px;color:#fff;font-size:13px;font-weight:700;font-family:monospace;
  width:72px;text-align:center;}
.aldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:1px;}
.ht{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);border:1px solid var(--line);
  padding:6px 14px;border-radius:18px;font-size:11px;color:var(--muted);
  z-index:80;opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
.ht.sh{opacity:1;}
#blog{position:fixed;bottom:48px;left:7px;right:7px;background:rgba(0,0,0,0.97);
  border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:monospace;font-size:10px;color:#4ade80;z-index:70;
  max-height:80px;overflow-y:auto;display:none;}
#blog.sh{display:block;}
</style>
</head>
<body>

<div class="tb">
  <button id="cb" class="pill">🔵 Connect</button>
  <div id="bs" class="pill">bLink3</div>
  <button id="eb">Налаштувати</button>
</div>
<div id="grid"><div id="gi"></div></div>
<div id="blog"></div>
<div class="ht" id="ht"></div>

<!-- EDIT MODAL -->
<div class="mb" id="em">
  <div class="ms">
    <div class="mh"><h3>Налаштувати</h3><button class="mc2" id="emc">✕</button></div>
    <div class="tbar">
      <div class="tab a" id="t0" onclick="st(0)">ЕКРАН</div>
      <div class="tab" id="t1" onclick="st(1)">PiP</div>
      <div class="tab" id="t2" onclick="st(2)">СИГНАЛИ</div>
    </div>
    <div class="mbody" id="emb"></div>
  </div>
</div>

<!-- PICKER -->
<div class="mb" id="pm">
  <div class="ms">
    <div class="mh"><h3 id="pt">Параметр</h3><button class="mc2" id="pmc">✕</button></div>
    <div class="mbody" id="pb"></div>
  </div>
</div>

<script>
/* ── PARAMS ── */
const P={
  RPM:      {n:'RPM',        o:26,s:2,sc:1,       b:0,  u:'rpm', mn:0,  mx:9000,c:'#ffd23f',src:'ble'},
  T_Eng:    {n:'T_Eng',      o:33,s:1,sc:1,       b:28, u:'°C',  mn:0,  mx:130, c:'#3b82f6',src:'ble'},
  T_Air:    {n:'T_Air',      o:24,s:1,sc:1,       b:28, u:'°C',  mn:-20,mx:80,  c:'#37e0e6',src:'ble'},
  AFR:      {n:'AFR',        o:20,s:1,sc:10,      b:0,  u:'AFR', mn:10, mx:18,  c:'#ffb74d',src:'ble'},
  AFR_WBO2: {n:'AFR WBO2',   o:55,s:2,sc:100,     b:0,  u:'AFR', mn:10, mx:18,  c:'#ff9f43',src:'ble'},
  SA:       {n:'SA',         o:25,s:1,sc:1,       b:128,u:'°',   mn:-30,mx:50,  c:'#ff6b81',src:'ble'},
  TPS:      {n:'TPS%',       o:34,s:1,sc:2.55,    b:0,  u:'%',   mn:0,  mx:100, c:'#37e0e6',src:'ble'},
  TPS_i:    {n:'TPS indx',   o:28,s:1,sc:1,       b:0,  u:'cnt', mn:0,  mx:255, c:'#37e0e6',src:'ble'},
  Volt:     {n:'Volt Batt',  o:29,s:1,sc:10,      b:0,  u:'V',   mn:10, mx:16,  c:'#4ade80',src:'ble'},
  Fuel_CL:  {n:'Fuel CL',    o:22,s:2,sc:5.12,    b:512,u:'%',   mn:-25,mx:25,  c:'#4ade80',src:'ble'},
  Cyl1_AP:  {n:'Cyl1 AP',    o:45,s:2,sc:256,     b:0,  u:'kPa', mn:0,  mx:110, c:'#37e0e6',src:'ble'},
  Veh_Spd:  {n:'Veh Speed',  o:51,s:2,sc:256,     b:0,  u:'km/h',mn:0,  mx:300, c:'#37e0e6',src:'ble'},
  Gear:     {n:'Gear',       o:130,s:1,sc:1,      b:0,  u:'',   mn:0,  mx:6,   c:'#3b82f6',src:'ble'},
  EGT:      {n:'EGT',        o:91,s:2,sc:1,       b:0,  u:'°C',  mn:0,  mx:1000,c:'#ff4d4d',src:'ble'},
  P_Atm:    {n:'Atm Press',  o:44,s:1,sc:1,       b:0,  u:'kPa', mn:80, mx:110, c:'#8a8a92',src:'ble'},
  FuelPW:   {n:'Fuel PW',    o:35,s:2,sc:289.0625,b:0,  u:'ms',  mn:0,  mx:20,  c:'#ffb74d',src:'ble'},
  Inj_Rate: {n:'Inj Rate',   o:82,s:1,sc:2.56,    b:0,  u:'%',   mn:0,  mx:100, c:'#ff9f43',src:'ble'},
  GPS:      {n:'GPS Speed',  o:-1,s:0,sc:1,       b:0,  u:'km/h',mn:0,  mx:300, c:'#37e0e6',src:'gps'},
  Alt:      {n:'Altitude',   o:-1,s:0,sc:1,       b:0,  u:'m',   mn:0,  mx:3000,c:'#8a8a92',src:'gps'},
};
const PG=[
  {t:'Двигун',    k:['RPM','T_Eng','T_Air','SA','Gear','EGT','P_Atm']},
  {t:'Паливо',    k:['AFR','AFR_WBO2','Fuel_CL','FuelPW','Inj_Rate']},
  {t:'Дросель',   k:['TPS','TPS_i','Cyl1_AP']},
  {t:'Швидкість', k:['GPS','Veh_Spd']},
  {t:'Електрика', k:['Volt']},
  {t:'Телефон',   k:['GPS','Alt']},
];
const V={};Object.keys(P).forEach(k=>V[k]='--');

/* ── ALERTS ── */
const DA={T_warn:90,T_crit:96,Volt_warn:12.5,Volt_crit:11.8};
let AL=lg('al')||{...DA};
let audioCtx=null,sounding=false,sndInt=null;
function gac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(){
  try{
    const ac=gac(),t=ac.currentTime;
    [[2600,0,.12],[1800,.16,.12],[2600,.32,.12]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.75,t+st+.01);
      g.gain.linearRampToValueAtTime(0.75,t+st+d-.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}
function startSnd(){if(sounding)return;sounding=true;beep();sndInt=setInterval(beep,900);}
function stopSnd(){if(!sounding)return;sounding=false;clearInterval(sndInt);sndInt=null;}

/* ── GPS ── */
let gpsId=null;
function startGPS(){
  if(!navigator.geolocation||gpsId)return;
  navigator.geolocation.getCurrentPosition(()=>{
    gpsId=navigator.geolocation.watchPosition(pos=>{
      V.GPS=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6*10)/10:0;
      V.Alt=pos.coords.altitude!=null?Math.round(pos.coords.altitude):'--';
      ud();
    },()=>{V.GPS='GPS?';V.Alt='GPS?';ud();},{enableHighAccuracy:true,maximumAge:1000});
  },()=>{V.GPS='GPS?';V.Alt='GPS?';ud();},{enableHighAccuracy:false,timeout:5000});
}
// запускаємо GPS після першого тапу користувача
document.addEventListener('touchstart',()=>startGPS(),{once:true});
document.addEventListener('click',()=>startGPS(),{once:true});
startGPS();

/* ── BLE ── */
let bDev=null,bChr=null,rxBuf=new Uint8Array(0),bConn=false;
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb',CHR='0000ffe1-0000-1000-8000-00805f9b34fb';
function ab(a,b){const c=new Uint8Array(a.length+b.length);c.set(a);c.set(b,a.length);return c;}
function tp(buf){
  for(let s=0;s<buf.length-20;s++)
    for(let l=20;l<=Math.min(200,buf.length-s-1);l++){
      let sum=0;for(let i=s;i<s+l;i++)sum+=buf[i];
      if(buf[s+l]===((256-(sum&0xFF))&0xFF))return{p:buf.slice(s,s+l),c:s+l+1};
    }
  return null;
}
function pp(pl){
  lb('Pkt '+pl.length+'B: '+Array.from(pl.slice(0,8)).map(b=>b.toString(16).padStart(2,'0')).join(' ')+'…');
  Object.entries(P).forEach(([k,p])=>{
    if(p.src!=='ble'||p.o+p.s>pl.length)return;
    let r=0;for(let i=0;i<p.s;i++)r=(r<<8)|pl[p.o+i];
    V[k]=(p.u==='rpm'||p.u==='')?Math.round((r-p.b)/p.sc):Math.round((r-p.b)/p.sc*10)/10;
  });
  ud();ca();
}
function od(e){
  rxBuf=ab(rxBuf,new Uint8Array(e.target.value.buffer));
  if(rxBuf.length>1024)rxBuf=rxBuf.slice(rxBuf.length-512);
  const r=tp(rxBuf);if(r){pp(r.p);rxBuf=rxBuf.slice(r.c);}
}
async function conn(){
  const btn=document.getElementById('cb');
  if(bConn){try{bDev&&bDev.gatt.disconnect();}catch(e){}
    bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='bLink3';
    document.getElementById('bs').className='pill';stopSnd();return;}
  btn.textContent='⏳…';btn.className='pill go';
  try{
    bDev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
    bDev.addEventListener('gattserverdisconnected',()=>{
      bConn=false;stopSnd();
      document.getElementById('cb').textContent='🔵 Connect';
      document.getElementById('cb').className='pill';
      document.getElementById('bs').textContent='Disconnected';
      document.getElementById('bs').className='pill err';
    });
    const srv=await bDev.gatt.connect();
    bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bChr.addEventListener('characteristicvaluechanged',od);
    await bChr.startNotifications();
    bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
    document.getElementById('bs').textContent='● LIVE';
    document.getElementById('bs').className='pill on';
    lb('Connected: '+bDev.name);hint('Підключено до '+bDev.name);
  }catch(e){bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='Error';
    document.getElementById('bs').className='pill err';
    lb('Err:'+e.message);hint('Помилка: '+e.message);}
}
document.getElementById('cb').addEventListener('click',conn);
let lv=false,lt;const blog=document.getElementById('blog');
function lb(m){blog.innerHTML+=m+'<br>';blog.scrollTop=blog.scrollHeight;}
document.getElementById('cb').addEventListener('pointerdown',()=>{lt=setTimeout(()=>{lv=!lv;blog.classList.toggle('sh',lv);},900);});
document.getElementById('cb').addEventListener('pointerup',()=>clearTimeout(lt));

/* ── STORAGE ── */
function lg(k){try{const s=localStorage.getItem('ar_'+k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem('ar_'+k,JSON.stringify(v));}catch(e){}}

/* ── LAYOUT ── */
function dl(){return[
  {id:'t1',k:'T_Eng',  st:'flat',sz:'s22'},
  {id:'t2',k:'GPS',    st:'flat',sz:'s22'},
  {id:'t3',k:'TPS',    st:'flat',sz:'s21'},
  {id:'t4',k:'Inj_Rate',st:'flat',sz:'s21'},
  {id:'t5',k:'Volt',   st:'flat',sz:'s21'},
  {id:'t6',k:'Alt',    st:'flat',sz:'s1'},
  {id:'t7',k:'T_Air',  st:'flat',sz:'s1'},
];}
let lay=lg('lay')||dl();
let em=false,nid=20,ds=null;
const gi=document.getElementById('gi');

// Alert check
const alertState={};
function ca(){
  let crit=false;
  lay.forEach(tile=>{
    const v=V[tile.k];
    if(v==='--'||isNaN(v)){alertState[tile.id]='';return;}
    let st='';
    if(tile.k==='T_Eng'){
      if(v>=AL.T_crit)st='alrt';
      else if(v>=AL.T_warn)st='warn';
    }else if(tile.k==='Volt'){
      if(v<=AL.Volt_crit)st='alrt';
      else if(v<=AL.Volt_warn)st='warn';
    }
    alertState[tile.id]=st;
    if(st==='alrt')crit=true;
  });
  // update DOM directly without re-render
  document.querySelectorAll('.tile[data-id]').forEach(el=>{
    el.classList.remove('warn','alrt');
    const s=alertState[el.dataset.id];
    if(s)el.classList.add(s);
  });
  if(crit)startSnd();else stopSnd();
}

/* ── RENDER ── */
function render(){
  const land=window.innerWidth>window.innerHeight;
  gi.innerHTML='';
  lay.forEach(tile=>{
    const el=mkTile(tile,land);
    if(alertState[tile.id])el.classList.add(alertState[tile.id]);
    gi.appendChild(el);
  });
  if(em){
    const a=document.createElement('div');
    a.className='tile add s1';a.textContent='+';
    a.addEventListener('click',()=>opk(null,'main'));
    gi.appendChild(a);
  }
}

function mkTile(tile,land){
  const p=P[tile.k];
  const el=document.createElement('div');
  el.className='tile '+tile.sz+(em?' ed':'');
  el.dataset.id=tile.id;
  el.style.setProperty('--pc',p.c);
  const rm=document.createElement('div');rm.className='rm';rm.textContent='✕';
  rm.addEventListener('click',e=>{e.stopPropagation();lay=lay.filter(t=>t.id!==tile.id);ls('lay',lay);render();});
  el.appendChild(rm);
  el.appendChild(tile.st==='gauge'?mkG(tile,p):mkF(tile,p));
  drag(el,tile);
  return el;
}

function mkF(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const u=document.createElement('div');u.className='tun';
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  const un=document.createElement('div');un.className='tu';un.textContent=p.u;
  w.append(l,u,v);if(p.u)w.append(un);return w;
}
function mkG(tile,p){
  const wrap=document.createElement('div');wrap.className='gw';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');svg.classList.add('gsvg');
  const r=42,C=2*Math.PI*r;
  const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','50');bg.setAttribute('cy','50');bg.setAttribute('r',r);bg.classList.add('gbg');
  bg.setAttribute('stroke-dasharray',`${C*.75} ${C}`);bg.setAttribute('stroke-dashoffset',C*.125);bg.setAttribute('transform','rotate(90 50 50)');
  const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fg.setAttribute('cx','50');fg.setAttribute('cy','50');fg.setAttribute('r',r);fg.classList.add('gfg');
  fg.setAttribute('transform','rotate(90 50 50)');fg.dataset.lid=tile.k;fg.dataset.r=r;fg.dataset.c=C;
  svg.append(bg,fg);
  const gc=document.createElement('div');gc.className='gc';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  const un=document.createElement('div');un.className='tu';un.textContent=p.u;
  gc.append(l,v);if(p.u)gc.append(un);
  wrap.append(svg,gc);ugf(fg,p,V[tile.k]);return wrap;
}
function ugf(fg,p,v){
  if(v==='--'||isNaN(v))return;
  const r=parseFloat(fg.dataset.r),C=parseFloat(fg.dataset.c);
  fg.setAttribute('stroke-dasharray',`${C*.75*Math.max(0,Math.min(1,(v-p.mn)/(p.mx-p.mn)))} ${C}`);
  fg.setAttribute('stroke-dashoffset',C*.125);
}

// Update display — only touch DOM nodes that changed
let prevV={};
function ud(){
  // Only update if tab is visible
  if(document.hidden)return;
  document.querySelectorAll('[data-lid]').forEach(el=>{
    const k=el.dataset.lid;
    const v=V[k];
    if(prevV[k]===v)return; // skip if unchanged
    if(el.tagName==='circle')ugf(el,P[k],v);
    else el.textContent=v;
  });
  prevV={...V};
}
// Pause updates when tab hidden
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) ud(); });

window.addEventListener('resize',()=>render(),{passive:true});
window.addEventListener('orientationchange',()=>setTimeout(render,80),{passive:true});

/* ── DRAG ── */
function drag(el,tile){
  let tc=0,tt=null,ts=0,dragging=false,sx=0,sy=0;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.rm'))return;
    ts=Date.now();sx=e.clientX;sy=e.clientY;
    if(em&&ds===tile.id){dragging=true;el.setPointerCapture(e.pointerId);e.preventDefault();}
  });
  el.addEventListener('pointermove',e=>{
    if(!dragging)return;e.preventDefault();
    const tgt=document.elementFromPoint(e.clientX,e.clientY)?.closest('.tile:not(.add)');
    document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));
    if(tgt&&tgt.dataset.id&&tgt.dataset.id!==tile.id){tgt.classList.add('dov');el._ov=tgt.dataset.id;}
    else el._ov=null;
  });
  el.addEventListener('pointerup',e=>{
    e.preventDefault();
    if(dragging){
      dragging=false;
      document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));
      if(el._ov){
        const fi=lay.findIndex(t=>t.id===tile.id),ti=lay.findIndex(t=>t.id===el._ov);
        if(fi>=0&&ti>=0){const[m]=lay.splice(fi,1);lay.splice(ti,0,m);ls('lay',lay);}
        el._ov=null;
      }
      ds=null;render();return;
    }
    if(Date.now()-ts>500)return;
    tc++;
    if(tc===1){
      tt=setTimeout(()=>{
        tc=0;
        if(em){
          if(ds===tile.id){ds=null;el.classList.remove('ds');hint('Скасовано');}
          else{document.querySelectorAll('.ds').forEach(x=>x.classList.remove('ds'));ds=tile.id;el.classList.add('ds');hint('Тягни плитку');}
        }else openTE(tile);
      },200);
    }else{
      clearTimeout(tt);tc=0;
      if(!em){enEM();setTimeout(()=>{ds=tile.id;document.querySelector(`[data-id="${tile.id}"]`)?.classList.add('ds');hint('Тягни плитку');},50);}
      else openTE(tile);
    }
  });
  el.addEventListener('pointercancel',()=>{dragging=false;document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));ds=null;render();});
}
function enEM(){em=true;document.getElementById('eb').className='a';document.getElementById('eb').textContent='Готово';render();}
function exEM(){em=false;ds=null;document.getElementById('eb').className='';document.getElementById('eb').textContent='Налаштувати';document.getElementById('em').classList.remove('sh');render();}

/* ── EDIT MODAL ── */
let ct=0;
const emod=document.getElementById('em');
document.getElementById('eb').addEventListener('click',()=>{if(em){exEM();return;}enEM();st(0);emod.classList.add('sh');});
document.getElementById('emc').addEventListener('click',()=>emod.classList.remove('sh'));
emod.addEventListener('click',e=>{if(e.target===emod)emod.classList.remove('sh');});

function st(tab){
  ct=tab;[0,1,2].forEach(i=>{document.getElementById('t'+i).className='tab'+(tab===i?' a':'');});
  if(tab===0)bmain();else if(tab===1)bpip();else balerts();
}
function openTE(tile){enEM();st(0);emod.classList.add('sh');opk(tile,'main');}

function bmain(){
  const body=document.getElementById('emb');body.innerHTML='';
  const g=document.createElement('div');g.className='gt';g.textContent='Плитки';body.appendChild(g);
  lay.forEach(tile=>{
    const p=P[tile.k];
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:7px;padding:7px 5px;border-bottom:1px solid var(--line);';
    row.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${p.c};flex-shrink:0;"></div>
      <div style="flex:1;font-size:12px;font-weight:600;">${p.n}</div>
      <div style="font-size:10px;color:var(--muted);">${tile.sz} ${tile.st}</div>`;
    const rm=document.createElement('button');
    rm.style.cssText='border:none;background:rgba(255,77,77,0.08);color:#ff8080;border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;';
    rm.textContent='✕';
    rm.addEventListener('click',()=>{lay=lay.filter(t=>t.id!==tile.id);ls('lay',lay);render();bmain();});
    row.appendChild(rm);body.appendChild(row);
  });
  const ab=document.createElement('button');ab.className='ab pr';ab.style.marginTop='9px';ab.textContent='+ Додати';
  ab.addEventListener('click',()=>opk(null,'main'));body.appendChild(ab);
}

/* ── PIP LAYOUT ── */
let pipL=lg('pip')||[{k:'RPM',col:'left'},{k:'T_Eng',col:'right'},{k:'Volt',col:'right'}];
let pipC=lg('pipc')||2;

function bpip(){
  const body=document.getElementById('emb');body.innerHTML='';
  const g=document.createElement('div');g.className='gt';g.textContent='Параметри PiP';body.appendChild(g);
  pipL.forEach((item,i)=>{
    const p=P[item.k];
    const row=document.createElement('div');row.className='pir';
    const dot=document.createElement('div');dot.style.cssText=`width:7px;height:7px;border-radius:50%;background:${p.c};flex-shrink:0;`;
    const nm=document.createElement('div');nm.style.cssText='flex:1;font-size:12px;font-weight:600;';nm.textContent=p.n;
    const cb=document.createElement('button');
    cb.className='pcb '+(item.col==='right'?'rgt':'lft');
    cb.textContent=item.col==='right'?'▶ права':'◀ ліва';
    cb.addEventListener('click',()=>{pipL[i].col=item.col==='right'?'left':'right';ls('pip',pipL);bpip();});
    const rm=document.createElement('button');rm.className='prm';rm.textContent='✕';
    rm.addEventListener('click',()=>{pipL.splice(i,1);ls('pip',pipL);bpip();});
    row.append(dot,nm,cb,rm);body.appendChild(row);
  });
  if(pipL.length<6){
    const ab=document.createElement('button');ab.className='ab pr';ab.style.marginTop='7px';ab.textContent='+ Додати';
    ab.addEventListener('click',()=>opk(null,'pip'));body.appendChild(ab);
  }
  const g2=document.createElement('div');g2.className='gt';g2.textContent='Колонки';body.appendChild(g2);
  const cr=document.createElement('div');cr.className='sr';
  [1,2,3].forEach(n=>{
    const b=document.createElement('div');b.className='sb'+(pipC===n?' sel':'');
    b.textContent=n+' кол.';b.addEventListener('click',()=>{pipC=n;ls('pipc',n);bpip();});cr.appendChild(b);
  });body.appendChild(cr);
}

function balerts(){
  const body=document.getElementById('emb');body.innerHTML='';
  const items=[
    {key:'T_warn', label:'T_Eng попередження',desc:'жовтий',color:'#ffd23f',unit:'°C'},
    {key:'T_crit', label:'T_Eng критично',    desc:'червоний + звук',color:'#ff4d4d',unit:'°C'},
    {key:'Volt_warn',label:'Volt низький',     desc:'жовтий',color:'#ffd23f',unit:'V'},
    {key:'Volt_crit',label:'Volt критично',    desc:'червоний + звук',color:'#ff4d4d',unit:'V'},
  ];
  const g=document.createElement('div');g.className='gt';g.textContent='Пороги';body.appendChild(g);
  items.forEach(item=>{
    const row=document.createElement('div');row.className='alrow';
    const dot=document.createElement('div');dot.className='aldot';dot.style.background=item.color;
    const lbl=document.createElement('div');lbl.className='allab';
    lbl.innerHTML=`${item.label}<span>${item.desc}</span>`;
    const inp=document.createElement('input');inp.className='alinp';inp.type='number';
    inp.value=AL[item.key];inp.step=item.unit==='°C'?1:0.1;
    inp.addEventListener('change',()=>{AL[item.key]=parseFloat(inp.value)||AL[item.key];ls('al',AL);});
    const un=document.createElement('div');un.style.cssText='font-size:10px;color:var(--muted);min-width:14px;';un.textContent=item.unit;
    row.append(dot,lbl,inp,un);body.appendChild(row);
  });
  const g2=document.createElement('div');g2.className='gt';g2.textContent='Тест';body.appendChild(g2);
  const tb=document.createElement('button');tb.className='ab pr';tb.textContent='🔊 Тест звуку';
  tb.addEventListener('click',function(){beep();});body.appendChild(tb);
  const rb=document.createElement('button');rb.className='ab dn';rb.textContent='Скинути';
  rb.addEventListener('click',()=>{AL={...DA};ls('al',AL);balerts();});body.appendChild(rb);
}

/* ── PICKER ── */
const pmod=document.getElementById('pm');
let ptile=null,pmode='main';
function opk(tile,mode){ptile=tile;pmode=mode;document.getElementById('pt').textContent=mode==='pip'?'Додати в PiP':tile?'Змінити':'Додати';bpick();pmod.classList.add('sh');}
function cpk(){pmod.classList.remove('sh');ptile=null;}
document.getElementById('pmc').addEventListener('click',cpk);
pmod.addEventListener('click',e=>{if(e.target===pmod)cpk();});

function bpick(){
  const body=document.getElementById('pb');body.innerHTML='';
  const cur=ptile?.k;const seen=new Set();
  PG.forEach(g=>{
    const gt=document.createElement('div');gt.className='gt';gt.textContent=g.t;body.appendChild(gt);
    const pl=document.createElement('div');pl.className='pl';
    g.k.forEach(k=>{
      if(seen.has(k))return;seen.add(k);
      const p=P[k];
      const item=document.createElement('div');
      item.className='pi'+(k===cur?' sel':'');
      item.innerHTML=`<div><span class="pn">${p.n}</span><span class="pc">${p.u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{
        if(pmode==='pip'){pipL.push({k,col:'left'});ls('pip',pipL);cpk();bpip();}
        else selp(k);
      });
      pl.appendChild(item);
    });
    body.appendChild(pl);
  });
  if(pmode==='main'){
    const sg=document.createElement('div');sg.className='gt';sg.textContent='Стиль';body.appendChild(sg);
    const sr=document.createElement('div');sr.className='sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.st||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });body.appendChild(sr);
    const szg=document.createElement('div');szg.className='gt';szg.textContent='Розмір';body.appendChild(szg);
    const szr=document.createElement('div');szr.className='szr';
    [['s1','1×1'],['s21','2×1'],['s22','2×2']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.sz||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });body.appendChild(szr);
    if(ptile){
      const db=document.createElement('button');db.className='ab dn';db.textContent='🗑 Видалити';
      db.addEventListener('click',()=>{lay=lay.filter(t=>t.id!==ptile.id);ls('lay',lay);cpk();render();bmain();});
      body.appendChild(db);
    }
  }
}
function selp(k){
  if(ptile)ptile.k=k;else{ptile={id:'t'+(nid++),k,st:'flat',sz:'s1'};lay.push(ptile);}
  ls('lay',lay);bpick();render();bmain();
}
function selst(v){if(ptile){ptile.st=v;ls('lay',lay);bpick();render();}}
function selsz(v){if(ptile){ptile.sz=v;ls('lay',lay);bpick();render();}}
function hint(m){const t=document.getElementById('ht');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2200);}

render();
</script>
